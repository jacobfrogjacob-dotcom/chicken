<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐤 小鸡手抄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#FFB800', secondary: '#FF6B35' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive; }
    .font-cc { font-family: 'Ma Shan Zheng', cursive; }
    input, textarea { font-family: 'Noto Sans SC', sans-serif !important; }
    .hide { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
    #wheelContainer {
      overflow: hidden;
    }
    #wheelContainer > div {
      position: absolute;
      inset: 0;
    }
    #wheelResult {
      animation: popIn 0.5s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 to-orange-50">

<div id="toast" class="hide fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl z-50 font-cc text-xl"></div>

<!-- Header -->
<header class="bg-gradient-to-r from-yellow-400 to-orange-400 shadow-lg">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between">
      <h1 class="text-4xl font-bold text-white font-cc">
        <span class="text-5xl">🐤</span> 小鸡手抄
      </h1>
      <div class="flex gap-2">
        <button onclick="showPage('home')" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-cc text-lg">首页</button>
        <button onclick="showPage('shop')" id="btnShop" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-cc text-lg">商店</button>
        <button onclick="showPage('admin')" id="btnAdmin" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-cc text-lg">管理</button>
        <button onclick="logout()" id="btnLogout" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-cc text-lg">退出</button>
        <button onclick="signIn()" id="btnLogin" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-cc text-lg">登录</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

  <!-- 欢迎横幅 -->
  <div id="welcomeBox" class="hide bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 rounded-2xl p-6 mb-6 text-white text-center font-cc text-2xl">
    🎉 欢迎回来，<span id="welcomeName"></span>！
  </div>

  <!-- 初次设定弹窗 -->
  <div id="setupModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md mx-4">
      <div class="text-center mb-6">
        <div class="text-6xl mb-4">👋</div>
        <h3 class="text-3xl font-bold font-cc">欢迎加入小鸡手抄！</h3>
        <p class="text-gray-600 font-cc">请先设定你的资料</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-lg mb-2 font-cc">昵称 *</label>
          <input type="text" id="setupName" placeholder="你想要粉丝怎么叫你？" class="w-full px-4 py-3 border rounded-xl text-lg">
        </div>
        <div>

      </div>
      <button onclick="completeSetup()" class="w-full mt-6 bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl font-cc text-xl">完成设定</button>
    </div>
  </div>

  <!-- 首页 -->
  <div id="pageHome">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- 左侧：聊天 -->
      <div class="lg:col-span-2 space-y-6">
        
        <!-- 登录提示 -->
        <div id="loginBox" class="bg-white rounded-2xl shadow-lg p-8 text-center">
          <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-yellow-400 to-orange-400 rounded-full flex items-center justify-center text-6xl">💬</div>
          <h2 class="text-3xl font-bold font-cc mb-2">欢迎来到小鸡手抄</h2>
          <p class="text-gray-600 font-cc mb-4">登录后即可参与聊天互动</p>
          <button onclick="signIn()" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 px-8 rounded-xl font-cc text-lg">使用 Google 登录</button>

        <!-- 聊天区 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-2xl font-cc">💬 即时聊天</h2>
          </div>
          <div id="chatBox" class="h-80 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
          <form onsubmit="sendMsg(event)" class="p-4 border-t bg-white">
            <div class="flex gap-2">
              <input type="text" id="msgInput" placeholder="输入讯息..." class="flex-1 px-4 py-2 border rounded-xl text-lg" disabled>
              <button type="submit" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-6 py-2 rounded-xl font-cc text-lg">传送</button>
            </div>
          </form>
        </div>

        <!-- 投稿区 -->
        <div id="postBox" class="hide bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-yellow-50 border-b border-yellow-200 p-4">
            <p class="text-yellow-700 font-cc text-lg">⚠️ 投稿前请先同意协作者邀请</p>
          </div>
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-2xl font-cc">📝 粉丝投稿</h2>
          </div>
          <form onsubmit="submitPost(event)" class="p-6 space-y-4">
            <div>
              <label class="block font-cc text-lg mb-2">IG 账号 *</label>
              <input type="text" id="postIG" class="w-full px-4 py-2 border rounded-xl text-lg" required>
            </div>

              <label class="block font-cc text-lg mb-2">投稿内容 *</label>
              <textarea id="postContent" rows="4" class="w-full px-4 py-2 border rounded-xl text-lg" placeholder="至少 10 个字" required></textarea>

            <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl font-cc text-lg">送出投稿</button>
          </form>
        </div>
      </div>

      <!-- 右侧：排行榜 -->
      <div class="space-y-6">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-2xl font-cc">🏆 粉丝排行榜</h2>
          </div>
          <div id="rankBox" class="p-4 space-y-3"></div>
        </div>

        <!-- 用户资讯 -->
        <div id="userBox" class="hide bg-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center gap-4 mb-4">
            <img id="userImg" src="" class="w-16 h-16 rounded-full border-4 border-yellow-400">
            <div>
              <h3 id="userName" class="text-xl font-bold font-cc"></h3>
              <span id="userTitle" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-3 py-1 rounded-full text-sm font-cc"></span>
            </div>
          </div>
          <div class="text-center font-cc text-lg space-y-2">
            <p>💰 金币：<strong id="userCoins">0</strong></p>
            <p>📊 积分：<strong id="userPoints">0</strong></p>
            <div class="flex gap-2 justify-center">
              <button onclick="doCheckIn()" id="btnCheckIn" class="bg-green-500 text-white px-4 py-2 rounded-lg font-cc">每日签到</button>
              <button onclick="showPage('wheel')" class="bg-purple-500 text-white px-4 py-2 rounded-lg font-cc">🎰 抽奖</button>
            </div>
            <button onclick="showProfile()" class="mt-2 bg-gray-100 px-4 py-2 rounded-lg font-cc">编辑资料</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 管理页面 -->
  <div id="pageAdmin" class="hide">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <div class="bg-gray-800 p-4">
        <h2 class="text-white font-bold text-2xl font-cc">⚙️ 管理员系统</h2>
      </div>
      
      <div class="flex border-b flex-wrap">
        <button onclick="adminTab('msgs')" id="tabMsgs" class="px-6 py-3 font-cc text-yellow-500 border-b-2 border-yellow-500 text-lg">讯息</button>
        <button onclick="adminTab('users')" id="tabUsers" class="px-6 py-3 font-cc text-gray-500 text-lg">用户</button>
        <button onclick="adminTab('coins')" id="tabCoins" class="px-6 py-3 font-cc text-gray-500 text-lg">💰 金币</button>
        <button onclick="adminTab('posts')" id="tabPosts" class="px-6 py-3 font-cc text-gray-500 text-lg">投稿</button>
        <button onclick="adminTab('shop')" id="tabShop" class="px-6 py-3 font-cc text-gray-500 text-lg">官方商店</button>
        <button onclick="adminTab('market')" id="tabMarket" class="px-6 py-3 font-cc text-gray-500 text-lg">玩家市集</button>
        <button onclick="adminTab('wheel')" id="tabWheel" class="px-6 py-3 font-cc text-gray-500 text-lg">轮盘</button>
      </div>

      <div id="adminMsgs" class="p-4 space-y-3"></div>
      <div id="adminUsers" class="hide p-4 space-y-3"></div>
      <div id="adminCoins" class="hide p-4 space-y-3"></div>
      <div id="adminPosts" class="hide p-4 space-y-3"></div>
      <div id="adminShop" class="hide p-4 space-y-3"></div>
      <div id="adminMarket" class="hide p-4 space-y-3"></div>
      <div id="adminWheel" class="hide p-4 space-y-3"></div>
    </div>
  </div>

  <!-- 商店页面 -->
  <div id="pageShop" class="hide">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
        <h2 class="text-white font-bold text-2xl font-cc">🛒 商店</h2>
      </div>
      
      <div class="flex border-b flex-wrap">
        <button onclick="shopTab('official')" id="shopTabOfficial" class="px-6 py-3 font-cc text-yellow-500 border-b-2 border-yellow-500 text-lg">官方商店</button>
        <button onclick="shopTab('market')" id="shopTabMarket" class="px-6 py-3 font-cc text-gray-500 text-lg">玩家市集</button>
        <button onclick="shopTab('my')" id="shopTabMy" class="px-6 py-3 font-cc text-gray-500 text-lg">我的物品</button>
        <button onclick="shopTab('apply')" id="shopTabApply" class="px-6 py-3 font-cc text-gray-500 text-lg">申请上架</button>
      </div>

      <div id="shopOfficial" class="p-4 space-y-3"></div>
      <div id="shopMarket" class="hide p-4 space-y-3"></div>
      <div id="shopMy" class="hide p-4 space-y-3"></div>
      <div id="shopApply" class="hide p-4 space-y-3"></div>
    </div>
  </div>

  <!-- 抽奖页面 -->
  <div id="pageWheel" class="hide">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden p-6">
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold font-cc bg-gradient-to-r from-purple-500 to-pink-500 text-transparent bg-clip-text">🎰 幸运轮盘</h2>
        <p class="font-cc text-xl mt-2">💰 你的金币：<strong id="wheelCoins">0</strong></p>
        <p class="font-cc text-gray-500">每次抽奖需 <strong class="text-purple-500">100</strong> 金币</p>
      </div>

      <div class="flex justify-center mb-8">
        <div class="relative">
          <div id="wheelPointer" class="absolute -top-6 left-1/2 -translate-x-1/2 text-5xl z-20 drop-shadow-lg" style="filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));">🔻</div>
          <div id="wheelContainer" class="relative w-72 h-72 rounded-full shadow-2xl" style="background: conic-gradient(#FF6B6B 0deg 45deg, #4ECDC4 45deg 90deg, #45B7D1 90deg 135deg, #96CEB4 135deg 180deg, #FFEAA7 180deg 225deg, #DDA0DD 225deg 270deg, #98D8C8 270deg 315deg, #F7DC6F 315deg 360deg); border: 8px solid #FFB800;">
            <div id="wheelLabels" class="absolute inset-0">
              <div class="absolute inset-0 flex flex-wrap content-start justify-center" style="transform: rotate(0deg);">
                <div class="absolute top-2 left-1/2 -translate-x-1/2 -translate-y-1/2" style="transform: rotate(22.5deg);">
                  <span class="text-xs font-bold text-white drop-shadow">50💰</span>
                </div>
              </div>
            </div>
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-16 h-16 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full shadow-lg flex items-center justify-center text-3xl border-4 border-white">
                🎯
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center">
        <button onclick="spinWheel()" id="btnSpin" class="bg-gradient-to-r from-purple-500 via-pink-500 to-rose-500 text-white font-bold py-4 px-12 rounded-full font-cc text-2xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all disabled:opacity-50 disabled:transform-none disabled:hover:scale-100">
          🎲 开始抽奖！
        </button>
      </div>

      <div id="wheelResult" class="hide mt-6 p-6 bg-gradient-to-r from-purple-100 to-pink-100 rounded-2xl text-center animate-bounce">
        <p class="font-cc text-2xl mb-2">🎉 恭喜获得</p>
        <p id="wheelPrize" class="font-bold text-4xl text-purple-600"></p>
      </div>
    </div>
  </div>
</main>

<!-- 编辑资料弹窗 -->
<div id="profileModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
    <h3 class="text-xl font-bold font-cc mb-4">编辑个人资料</h3>
    <div class="space-y-4">
      <div>
        <label class="block font-cc mb-2 text-lg">昵称</label>
        <input type="text" id="editName" class="w-full px-4 py-2 border rounded-xl text-lg">
      </div>
      <div>
        <label class="block font-cc mb-2 text-lg">IG 账号</label>
        <input type="text" id="editIG" class="w-full px-4 py-2 border rounded-xl text-lg">
      </div>
    </div>
    <div class="flex gap-2 mt-6">
      <button onclick="saveProfile()" class="flex-1 bg-gradient-to-r from-yellow-400 to-orange-400 text-white py-2 rounded-xl font-cc text-lg">储存</button>
      <button onclick="closeProfile()" class="flex-1 bg-gray-200 py-2 rounded-xl font-cc text-lg">取消</button>
    </div>
  </div>
</div>

<script>
// Firebase 设定
firebase.initializeApp({
  apiKey: "AIzaSyC9ARCgaoXfLFRVQb3djEhxN7ephFTlZ-U",
  authDomain: "chicken-33a60.firebaseapp.com",
  projectId: "chicken-33a60",
  storageBucket: "chicken-33a60.firebasestorage.app",
  messagingSenderId: "646431742714",
  appId: "1:646431742714:web:47d9a7f456843a6b9bc743"
});

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = 'jacob.frog.jacob@gmail.com';
const SPIN_COST = 100;
const CHECKIN_REWARD = 50;

let me = null;
let meData = null;
let unsubMsg = null;
let isSpinning = false;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hide');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

function fmtPts(n) {
  if (n >= 1000000000) return (n/1000000000).toFixed(1).replace(/\.0$/,'') + 'B';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + 'W';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n;
}

// 登录
async function signIn() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch (e) {
    toast('登录失败');
  }
}

// 登出
async function logout() {
  await auth.signOut();
}

// 认证监听
auth.onAuthStateChanged(async (user) => {
  me = user;
  
  if (user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    
    const isBuiltInAdmin = user.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    
    if (snap.exists) {
      meData = snap.data();
      if (isBuiltInAdmin && !meData.isAdmin) {
        await ref.update({ isAdmin: true });
        meData.isAdmin = true;
      }
    } else {
      meData = {
        displayName: user.displayName || '粉丝',
        email: user.email,
        photoURL: user.photoURL,
        title: '新进粉丝',
        igAccount: '',
        points: 0,
        coins: 500,
        inventory: [],
        lastCheckIn: null,
        isTopFan: false,
        isAdmin: isBuiltInAdmin
      };
      await ref.set(meData);
    }
    
    document.getElementById('loginBox').classList.add('hide');
    document.getElementById('userBox').classList.remove('hide');
    document.getElementById('postBox').classList.remove('hide');
    document.getElementById('welcomeBox').classList.remove('hide');
    document.getElementById('welcomeName').textContent = meData.displayName;
    document.getElementById('userImg').src = meData.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>';
    document.getElementById('userName').textContent = meData.displayName;
    document.getElementById('userTitle').textContent = meData.title;
    document.getElementById('userPoints').textContent = fmtPts(meData.points || 0);
    document.getElementById('userCoins').textContent = meData.coins || 0;
    document.getElementById('postIG').value = meData.igAccount || '';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnLogin').classList.add('hide');
    document.getElementById('btnLogout').classList.remove('hide');
    document.getElementById('btnShop').classList.remove('hide');
    updateCheckInBtn();
    checkDailyReward();
    
    if (meData.isAdmin) {
      document.getElementById('btnAdmin').classList.remove('hide');
    }
    
    if (!meData.igAccount) {
      document.getElementById('setupModal').classList.remove('hide');
      document.getElementById('setupName').value = meData.displayName;
    }
    
    toast('登录成功！');
  } else {
    meData = null;
    document.getElementById('loginBox').classList.remove('hide');
    document.getElementById('userBox').classList.add('hide');
    document.getElementById('postBox').classList.add('hide');
    document.getElementById('welcomeBox').classList.add('hide');
    document.getElementById('setupModal').classList.add('hide');
    document.getElementById('btnLogin').classList.remove('hide');
    document.getElementById('btnLogout').classList.add('hide');
    document.getElementById('btnAdmin').classList.add('hide');
    document.getElementById('msgInput').disabled = true;
    if (unsubMsg) unsubMsg();
  }
  
  loadChat();
  loadRank();
});

// 完成设定
async function completeSetup() {
  const name = document.getElementById('setupName').value.trim();
  const ig = document.getElementById('setupIG').value.trim();
  
  if (!name || name.length < 2) { toast('昵称需至少2字'); return; }
  if (!ig) { toast('请填IG账号'); return; }
  
  await db.collection('users').doc(me.uid).update({ displayName: name, igAccount: ig });
  meData.displayName = name;
  meData.igAccount = ig;
  
  document.getElementById('userName').textContent = name;
  document.getElementById('welcomeName').textContent = name;
  document.getElementById('postIG').value = ig;
  document.getElementById('setupModal').classList.add('hide');
  
  toast('设定完成！');
}

// 传送讯息
async function sendMsg(e) {
  e.preventDefault();
  if (!me || !meData) return;
  
  const content = document.getElementById('msgInput').value.trim();
  if (!content) return;
  
  await db.collection('messages').add({
    userId: me.uid,
    userName: meData.displayName,
    userAvatar: meData.photoURL,
    content,
    likes: 0,
    likedBy: [],
    isPinned: false,
    reply: null,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  await db.collection('users').doc(me.uid).update({
    points: firebase.firestore.FieldValue.increment(1),
    coins: firebase.firestore.FieldValue.increment(1)
  });
  meData.coins = (meData.coins || 0) + 1;
  document.getElementById('userCoins').textContent = meData.coins;
  
  document.getElementById('msgInput').value = '';
}

// 载入聊天
function loadChat() {
  if (unsubMsg) unsubMsg();
  
  unsubMsg = db.collection('messages')
    .orderBy('time', 'asc')
    .onSnapshot(snap => {
      const box = document.getElementById('chatBox');
      box.innerHTML = '';
      
      snap.forEach(doc => {
        const m = doc.data();
        const isMe = m.userId === me?.uid;
        const time = m.time?.toDate()?.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) || '';
        
        let html = `
          <div class="p-3 rounded-xl ${isMe ? 'bg-yellow-50' : 'bg-white'}">
            <div class="flex justify-between items-start gap-3">
              <div class="flex gap-3 flex-1 min-w-0">

// ============ 轮盘系统 ============
const WHEEL_ITEMS = [
  { label: '50💰', weight: 30, type: 'coins', value: 50 },
  { label: '100💰', weight: 25, type: 'coins', value: 100 },
  { label: '200💰', weight: 15, type: 'coins', value: 200 },
  { label: '谢谢参与', weight: 15, type: 'none', value: 0 },
  { label: '稀有称号', weight: 5, type: 'title', value: '幸运星' },
  { label: '神秘礼盒', weight: 5, type: 'item', value: '神秘礼盒' },
  { label: '500💰', weight: 4, type: 'coins', value: 500 },
  { label: '2000💰', weight: 1, type: 'coins', value: 2000 }
];

let currentRotation = 0;

function initWheel() {
  const container = document.getElementById('wheelContainer');
  if (!container) return;
  
  const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'];
  const sliceAngle = 360 / WHEEL_ITEMS.length;
  
  container.style.background = `conic-gradient(${WHEEL_ITEMS.map((item, i) => 
    `${colors[i]} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg`
  ).join(', ')})`;
  
  container.innerHTML = WHEEL_ITEMS.map((item, i) => `
    <div class="absolute inset-0 flex items-center justify-center" style="transform: rotate(${i * sliceAngle + sliceAngle / 2}deg);">
      <div class="absolute top-4 text-white text-sm font-bold drop-shadow-lg" style="transform: rotate(-${i * sliceAngle + sliceAngle / 2}deg);">
        ${item.label}
      </div>
    </div>
  `).join('') + `
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-14 h-14 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full shadow-lg flex items-center justify-center text-2xl border-4 border-white z-10">
        🎯
      </div>
    </div>
  `;
  
  container.style.transform = 'rotate(0deg)';
  container.style.transition = 'none';
}

function updateWheelCoins() {
  document.getElementById('wheelCoins').textContent = meData.coins || 0;
  const btn = document.getElementById('btnSpin');
  if (btn) btn.disabled = (meData.coins || 0) < SPIN_COST;
}

function getRandomPrize() {
  const totalWeight = WHEEL_ITEMS.reduce((sum, item) => sum + item.weight, 0);
  let random = Math.random() * totalWeight;
  for (const item of WHEEL_ITEMS) {
    random -= item.weight;
    if (random <= 0) return item;
  }
  return WHEEL_ITEMS[0];
}

async function spinWheel() {
  if (isSpinning) return;
  if ((meData.coins || 0) < SPIN_COST) {
    toast('金币不足！');
    return;
  }
  
  if (!me) {
    toast('请先登录！');
    return;
  }
  
  isSpinning = true;
  const btn = document.getElementById('btnSpin');
  btn.disabled = true;
  btn.textContent = '🎡 抽奖中...';
  
  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-SPIN_COST)
  });
  meData.coins -= SPIN_COST;
  document.getElementById('wheelCoins').textContent = meData.coins;
  document.getElementById('userCoins').textContent = meData.coins;
  
  const prize = getRandomPrize();
  const sliceAngle = 360 / WHEEL_ITEMS.length;
  const prizeIndex = WHEEL_ITEMS.indexOf(prize);
  const targetAngle = prizeIndex * sliceAngle + sliceAngle / 2;
  
  const container = document.getElementById('wheelContainer');
  const extraSpins = 5 * 360;
  const newRotation = currentRotation + extraSpins + targetAngle;
  
  container.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
  container.style.transform = `rotate(${newRotation}deg)`;
  currentRotation = newRotation;
  
  setTimeout(() => {
    isSpinning = false;
    btn.textContent = '🎲 开始抽奖！';
    btn.disabled = (meData.coins || 0) < SPIN_COST;
    showWheelResult(prize);
  }, 4100);
}

async function showWheelResult(prize) {
  const resultBox = document.getElementById('wheelResult');
  const prizeText = document.getElementById('wheelPrize');
  resultBox.classList.remove('hide');
  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  let displayLabel = prize.label;
  if (prize.type === 'coins' && prize.value >= 1000) {
    displayLabel = `${prize.value / 1000}K 💰`;
  }
  prizeText.textContent = displayLabel;
  
  if (prize.type === 'coins' && prize.value > 0) {
    await db.collection('users').doc(me.uid).update({
      coins: firebase.firestore.FieldValue.increment(prize.value)
    });
    meData.coins += prize.value;
    document.getElementById('userCoins').textContent = meData.coins;
    updateWheelCoins();
  } else if (prize.type === 'title') {
    await db.collection('users').doc(me.uid).update({ title: prize.value });
    meData.title = prize.value;
    document.getElementById('userTitle').textContent = prize.value;
  } else if (prize.type === 'item') {
    const inv = meData.inventory || [];
    inv.push({ name: prize.value, time: Date.now() });
    await db.collection('users').doc(me.uid).update({ inventory: inv });
    meData.inventory = inv;
  }
  
  setTimeout(() => {
    resultBox.classList.add('hide');
  }, 4000);
}

async function buyOfficialItem(itemId, price, name) {
  if ((meData.coins || 0) < price) {
    toast('金币不足！');
    return;
  }
  if (!confirm(`确定花费 ${price} 金币购买「${name}」？`)) return;
  
  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-price),
    inventory: firebase.firestore.FieldValue.arrayUnion({ name, itemId, time: Date.now() })
  });
  meData.coins -= price;
  meData.inventory = meData.inventory || [];
  meData.inventory.push({ name, itemId, time: Date.now() });
  document.getElementById('userCoins').textContent = meData.coins;
  toast(`购买成功！获得「${name}」`);
  loadOfficialShop();
}

async function bidItem(itemId, currentPrice) {
  const bid = prompt(`当前价格 ${currentPrice}，请输入你的出价（需高于当前价格）：`);
  if (!bid) return;
  const bidNum = parseInt(bid);
  if (isNaN(bidNum) || bidNum <= currentPrice) {
    toast('出价需高于当前价格');
    return;
  }
  if ((meData.coins || 0) < bidNum) {
    toast('金币不足！');
    return;
  }
  await db.collection('marketplace').doc(itemId).update({
    highestBid: bidNum,
    highestBidder: meData.displayName,
    highestBidderId: me.uid
  });
  toast('出价成功！');
  loadMarket();
}

async function buyNowItem(itemId, price, name, sellerId) {
  if (sellerId === me?.uid) { toast('不能购买自己的商品'); return; }
  if ((meData.coins || 0) < price) {
    toast('金币不足！');
    return;
  }
  if (!confirm(`确定花费 ${price} 金币购买「${name}」？`)) return;
  
  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-price)
  });
  await db.collection('users').doc(sellerId).update({
    coins: firebase.firestore.FieldValue.increment(price)
  });
  await db.collection('marketplace').doc(itemId).update({
    status: 'sold',
    buyerId: me.uid,
    buyerName: meData.displayName
  });
  meData.coins -= price;
  document.getElementById('userCoins').textContent = meData.coins;
  toast('购买成功！');
  loadMarket();
}

async function listOnMarket() {
  const name = document.getElementById('sellName').value.trim();
  const price = parseInt(document.getElementById('sellPrice').value);
  if (!name || !price || price <= 0) { toast('请填写正确的物品名称和价格'); return; }
  
  const item = { name, emoji: '📦', price, sellerId: me.uid, sellerName: meData.displayName, time: Date.now(), status: 'selling' };
  await db.collection('marketplace').add(item);
  toast('已上架到玩家市集！');
  document.getElementById('sellName').value = '';
  document.getElementById('sellPrice').value = '';
}

async function useItem(index) {
  const inv = meData.inventory || [];
  if (index >= inv.length) return;
  const item = inv[index];
  toast(`使用了「${item.name}」`);
  inv.splice(index, 1);
  await db.collection('users').doc(me.uid).update({ inventory: inv });
  meData.inventory = inv;
  loadMyItems();
}

async function giftItem(index) {
  const inv = meData.inventory || [];
  if (index >= inv.length) return;
  const item = inv[index];
  const target = prompt('请输入对方的昵称：');
  if (!target) return;
  
  const snap = await db.collection('users').where('displayName', '==', target).limit(1).get();
  if (snap.empty) { toast('未找到该用户'); return; }
  const targetDoc = snap.docs[0];
  
  inv.splice(index, 1);
  const targetInv = targetDoc.data().inventory || [];
  targetInv.push(item);
  
  await db.collection('users').doc(me.uid).update({ inventory: inv });
  await db.collection('users').doc(targetDoc.id).update({ inventory: targetInv });
  meData.inventory = inv;
  toast(`已将「${item.name}」送给 ${target}！`);
  loadMyItems();
}

async function initDefaultShop() {
  const snap = await db.collection('shopItems').limit(1).get();
  if (snap.empty) {
    await db.collection('shopItems').add({ name: '稀有称号卡', emoji: '🏆', price: 500, status: 'active', time: Date.now() });
    await db.collection('shopItems').add({ name: '改名卡', emoji: '✏️', price: 200, status: 'active', time: Date.now() });
    await db.collection('shopItems').add({ name: '幸运符', emoji: '🍀', price: 100, status: 'active', time: Date.now() });
  }
}
