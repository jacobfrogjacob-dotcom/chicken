<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小鸡手抄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { paper: '#f5f0e6', ink: '#2d2d2d' } } } }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background-color: #f5f0e6; }
    .font-cc { font-family: 'Ma Shan Zheng', cursive; }
    .hide { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #8b4513; border-radius: 4px; }
    .paper { background-color: #f5f0e6; border: 2px solid #2d2d2d; }
    .ink { color: #2d2d2d; }
    .border-ink { border: 2px solid #2d2d2d; }
    .card-gold { background: linear-gradient(135deg, #ffd700, #ffb800); }
    .card-red { background: linear-gradient(135deg, #ff4444, #cc0000); }
    .card-pink { background: linear-gradient(135deg, #ff69b4, #ff1493); }
    .card-gray { background: linear-gradient(135deg, #999, #666); }
  </style>
  <script>
    firebase.initializeApp({ apiKey: "AIzaSyC9ARCgaoXfLFRVQb3djEhxN7ephFTlZ-U", authDomain: "chicken-33a60.firebaseapp.com", projectId: "chicken-33a60", storageBucket: "chicken-33a60.firebasestorage.app", messagingSenderId: "646431742714", appId: "1:646431742714:web:47d9a7f456843a6b9bc743" });
    const auth = firebase.auth(), db = firebase.firestore();
    const ADMIN = 'jacob.frog.jacob@gmail.com', SPIN_COST = 100, CHECKIN = 50;
    let me = null, meData = {};
    const CARD_NAMES = [{name:'大圣',desc:'齐天大圣'}, {name:'天蓬',desc:'天河元帅'}, {name:'卷帘',desc:'卷帘大将'}, {name:'白龙',desc:'西海龙王'}, {name:'唐僧',desc:'金蝉子'}, {name:'悟空',desc:'斗战胜佛'}, {name:'八戒',desc:'净坛使者'}, {name:'沙僧',desc:'金身罗汉'}];
    const CARD_QUALITIES = { gold:{name:'金',bg:'card-gold text-white'}, red:{name:'红',bg:'card-red text-white'}, pink:{name:'粉',bg:'card-pink text-white'}, gray:{name:'灰',bg:'card-gray text-white'} };
    const CARD_TYPES = ['atk','def','hp','speed','lucky','crit','dodge','regen'];
    function toSim(s) { if(!s)return''; return s.replace(/來/g,'来').replace(/說/g,'说').replace(/為/g,'为').replace(/與/g,'与').replace(/這/g,'这').replace(/裡/g,'里').replace(/問/g,'问').replace(/時/g,'时').replace(/國/g,'国').replace(/學/g,'学').replace(/愛/g,'爱').replace(/後/g,'后').replace(/從/g,'从').replace(/會/g,'会').replace(/長/g,'长').replace(/開/g,'开').replace(/門/g,'门').replace(/種/g,'种').replace(/樣/g,'样').replace(/點/g,'点').replace(/號/g,'号').replace(/嗎/g,'吗').replace(/沒/g,'没有').replace(/個/g,'个').replace(/請/g,'请').replace(/謝/g,'谢').replace(/對/g,'对').replace(/兩/g,'两').replace(/給/g,'给').replace(/當/g,'当').replace(/聽/g,'听').replace(/寫/g,'写').replace(/話/g,'话').replace(/幫/g,'帮').replace(/覺/g,'觉').replace(/應/g,'应').replace(/比較/g,'比较').replace(/問題/g,'问题').replace(/還/g,'还'); }
    function fmtPts(n) { if(n>=1e9)return(n/1e9).toFixed(1)+'B'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e4)return(n/1e4).toFixed(1)+'W'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n; }
    function toast(msg) { const t=document.getElementById('toast'); t.textContent=toSim(msg); t.classList.remove('hide'); t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500); }
    function signIn() { const p=new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).catch(e=>toast('登录失败')); }
    function logout() { auth.signOut(); }
    auth.onAuthStateChanged(async u=>{ if(u){ const d=await db.collection('users').doc(u.uid).get(); if(d.exists){ me=u; meData=d.data(); onLogin(); }else{ document.getElementById('setupModal').classList.remove('hide'); } }else{ onLogout(); } });
    function onLogin(){ document.getElementById('loginBox').classList.add('hide'); document.getElementById('userBox').classList.remove('hide'); document.getElementById('postBox').classList.remove('hide'); document.getElementById('welcomeBox').classList.remove('hide'); document.getElementById('welcomeName').textContent=meData.displayName; document.getElementById('userImg').src=meData.photoURL||''; document.getElementById('userName').textContent=meData.displayName; document.getElementById('userCoins').textContent=meData.coins||0; document.getElementById('userPoints').textContent=fmtPts(meData.points||0); document.getElementById('btnLogin').classList.add('hide'); document.getElementById('btnLogout').classList.remove('hide'); if(u.email===ADMIN||u.email===ADMIN.replace('frog','frog.')){ document.getElementById('btnAdmin').classList.remove('hide'); } loadChat(); loadRank(); }
    function onLogout(){ document.getElementById('loginBox').classList.remove('hide'); document.getElementById('userBox').classList.add('hide'); document.getElementById('postBox').classList.add('hide'); document.getElementById('welcomeBox').classList.add('hide'); document.getElementById('btnLogin').classList.remove('hide'); document.getElementById('btnLogout').classList.add('hide'); document.getElementById('btnAdmin').classList.add('hide'); }
    function completeSetup(){ const n=document.getElementById('setupName').value.trim(); const ig=document.getElementById('setupIG').value.trim(); if(!n||!ig){ toast('请填写完整'); return; } db.collection('users').doc(me.uid).set({ displayName:n, igAccount:ig, photoURL:me.photoURL, email:me.email, points:0, coins:500, inventory:[], time:Date.now() }); document.getElementById('setupModal').classList.add('hide'); location.reload(); }
    async function loadChat(){ db.collection('messages').orderBy('time','desc').limit(50).onSnapshot(s=>{ const b=document.getElementById('chatBox'); b.innerHTML=''; s.forEach(d=>{ const m=d.data(); b.innerHTML+=`<div class="p-2 rounded paper"><div class="flex items-center gap-2"><img src="${m.userAvatar||''}" class="w-8 h-8 rounded-full"><span class="font-bold ink">${m.userName}</span></div><p class="ink">${m.content}</p></div>`; }); }); }
    async function sendMsg(e){ e.preventDefault(); const i=document.getElementById('msgInput'); const c=i.value.trim(); if(!c)return; await db.collection('messages').add({ userId:me.uid, userName:meData.displayName, userAvatar:meData.photoURL, content:c, time:Date.now() }); await db.collection('users').doc(me.uid).update({ points:firebase.firestore.FieldValue.increment(1), coins:firebase.firestore.FieldValue.increment(1) }); i.value=''; }
    function loadRank(){ db.collection('users').orderBy('points','desc').limit(10).onSnapshot(s=>{ const b=document.getElementById('rankBox'); b.innerHTML=''; let r=1; s.forEach(d=>{ const u=d.data(); if(u.points>0){ const ic=r===1?'👑':r===2?'🥈':r===3?'🥉':'🏆'; b.innerHTML+=`<div class="p-2 rounded paper flex items-center gap-2"><span class="text-xl">${ic}</span><span class="font-bold flex-1 ink">${u.displayName}</span><span class="ink">${fmtPts(u.points)}</span></div>`; r++; } }); }); }
    async function doCheckIn(){ const last=meData.lastCheckIn||0; const now=Date.now(); if(now-last<86400000){ toast('明天再来'); return; } await db.collection('users').doc(me.uid).update({ coins:firebase.firestore.FieldValue.increment(CHECKIN), lastCheckIn:now }); toast('获得 '+CHECKIN+' 金币'); location.reload(); }
    function showPage(p){ ['pageHome','pageShop','pageWheel','pageAdmin'].forEach(x=>document.getElementById(x).classList.add('hide')); document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.remove('hide'); if(p==='shop'){ loadShop(); loadMarket(); loadMyItems(); } if(p==='wheel'){ document.getElementById('wheelCoins').textContent=meData.coins||0; } }
    function loadShop(){ db.collection('shopItems').orderBy('time','desc').onSnapshot(s=>{ const b=document.getElementById('shopList'); b.innerHTML=''; s.forEach(d=>{ const i=d.data(); b.innerHTML+=`<div class="p-4 rounded paper text-center"><div class="text-4xl">${i.emoji||'🎁'}</div><div class="font-bold ink">${i.name}</div><div class="ink">${i.price} 金币</div><button onclick="buyItem('${d.id}',${i.price},'${i.name}')" class="mt-2 px-4 py-1 rounded border-ink paper">购买</button></div>`; }); }); }
    async function buyItem(id,price,name){ if((meData.coins||0)<price){ toast('金币不足'); return; } if(confirm('购买 '+name+' ?')){ await db.collection('users').doc(me.uid).update({ coins:firebase.firestore.FieldValue.increment(-price), inventory:firebase.firestore.FieldValue.arrayUnion({name:name,emoji:'🎁',time:Date.now()}) }); toast('购买成功'); } }
    function loadMarket(){ db.collection('marketplace').where('status','==','selling').orderBy('time','desc').onSnapshot(s=>{ const b=document.getElementById('marketList'); b.innerHTML=s.empty?'<p class="ink text-center p-4">暂无商品</p>':''; s.forEach(d=>{ const i=d.data(); const own=i.sellerId===me?.uid; b.innerHTML+=`<div class="p-3 rounded paper"><div class="font-bold ink">${i.name}</div><div class="ink">${i.price} 金币 ${own?'(你的)':'<button onclick="buyMarket(\''+d.id+'\','+i.price+',\''+i.name+'\',\''+i.sellerId+'\')" class="px-2 py-1 rounded border-ink">购买</button>'}</div></div>`; }); }); }
    async function buyMarket(id,price,name,seller){ if(seller===me?.uid){ toast('不能买自己的'); return; } if(confirm('购买 '+name+' ?')){ await db.collection('users').doc(me.uid).update({coins:firebase.firestore.FieldValue.increment(-price)}); await db.collection('users').doc(seller).update({coins:firebase.firestore.FieldValue.increment(price)}); await db.collection('marketplace').doc(id).update({status:'sold',buyerId:me.uid,buyerName:meData.displayName}); loadMarket(); toast('购买成功'); } }
    function loadMyItems(){ const b=document.getElementById('myItems'); const inv=meData.inventory||[]; b.innerHTML=inv.length?'<p class="ink text-center">无物品</p>':''; inv.forEach((it,i)=>{ b.innerHTML+=`<div class="p-2 rounded paper flex items-center gap-2"><span>${it.emoji}</span><span class="flex-1 ink">${it.name}</span></div>`; }); }
  </script>
</head>
<body class="min-h-screen">
<div id="toast" class="hide fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl z-50 ink" style="background:#2d2d2d;color:#f5f0e6;"></div>

<header class="shadow-lg paper">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <h1 class="text-2xl font-bold ink font-cc">小鸡手抄</h1>
    <div class="flex gap-2">
      <button onclick="showPage('home')" class="px-2 py-1 rounded ink hover:bg-gray-200 font-cc">首页</button>
      <button onclick="showPage('shop')" class="px-2 py-1 rounded ink hover:bg-gray-200 font-cc">商店</button>
      <button onclick="showPage('wheel')" class="px-2 py-1 rounded ink hover:bg-gray-200 font-cc">抽奖</button>
      <button onclick="showPage('admin')" id="btnAdmin" class="hide px-2 py-1 rounded ink hover:bg-gray-200 font-cc">管理</button>
      <button onclick="logout()" id="btnLogout" class="hide px-2 py-1 rounded ink hover:bg-gray-200 font-cc">退出</button>
      <button onclick="signIn()" id="btnLogin" class="px-2 py-1 rounded ink border-ink paper font-cc">登录</button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6">
  <!-- 首页 -->
  <div id="pageHome">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="lg:col-span-2 space-y-4">
        <div id="loginBox" class="p-6 rounded paper text-center">
          <h2 class="text-xl font-bold ink mb-2 font-cc">欢迎来到小鸡手抄</h2>
          <p class="ink mb-3 font-cc">登录后即可参与聊天互动</p>
          <button onclick="signIn()" class="px-6 py-2 rounded border-ink paper font-cc">使用 Google 登录</button>
        </div>
        <div class="p-4 rounded paper">
          <h3 class="text-lg font-bold ink mb-3 font-cc">即时聊天</h3>
          <div id="chatBox" class="h-64 overflow-y-auto space-y-2"></div>
          <form onsubmit="sendMsg(event)" class="mt-3 flex gap-2">
            <input type="text" id="msgInput" placeholder="输入讯息..." class="flex-1 px-3 py-2 rounded border-ink paper ink" disabled>
            <button type="submit" class="px-4 py-2 rounded border-ink paper ink font-cc">发送</button>
          </form>
        </div>
        <div id="postBox" class="hide p-4 rounded paper">
          <h3 class="text-lg font-bold ink mb-3 font-cc">粉丝投稿</h3>
          <form onsubmit="submitPost(event)" class="space-y-2">
            <input type="text" name="content" placeholder="投稿内容..." class="w-full px-3 py-2 rounded border-ink paper ink">
            <button type="submit" class="px-4 py-2 rounded border-ink paper ink font-cc">投稿</button>
          </form>
        </div>
      </div>
      <div class="space-y-4">
        <div id="userBox" class="hide p-4 rounded paper">
          <div class="flex items-center gap-3 mb-3">
            <img id="userImg" class="w-12 h-12 rounded-full border-ink">
            <div>
              <div id="userName" class="font-bold ink"></div>
              <div class="text-sm ink">金币: <span id="userCoins">0</span> | 积分: <span id="userPoints">0</span></div>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="doCheckIn()" class="flex-1 px-3 py-2 rounded border-ink paper ink font-cc">每日签到</button>
            <button onclick="showPage('wheel')" class="flex-1 px-3 py-2 rounded border-ink paper ink font-cc">抽奖</button>
          </div>
        </div>
        <div class="p-4 rounded paper">
          <h3 class="text-lg font-bold ink mb-3 font-cc">粉丝排行榜</h3>
          <div id="rankBox" class="space-y-2 max-h-48 overflow-y-auto"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 商店 -->
  <div id="pageShop" class="hide">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="p-4 rounded paper">
        <h3 class="text-lg font-bold ink mb-3 font-cc">官方商店</h3>
        <div id="shopList" class="grid grid-cols-2 gap-2"></div>
      </div>
      <div class="p-4 rounded paper">
        <h3 class="text-lg font-bold ink mb-3 font-cc">玩家市集</h3>
        <div id="marketList" class="space-y-2"></div>
      </div>
      <div class="p-4 rounded paper">
        <h3 class="text-lg font-bold ink mb-3 font-cc">我的物品</h3>
        <div id="myItems" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <!-- 抽奖 -->
  <div id="pageWheel" class="hide">
    <div class="p-6 rounded paper text-center">
      <h2 class="text-2xl font-bold ink mb-4 font-cc">幸运轮盘</h2>
      <p class="ink mb-4 font-cc">金币: <span id="wheelCoins">0</span></p>
      <div class="text-6xl mb-6">🎰</div>
      <button onclick="spinWheel()" class="px-8 py-3 rounded border-ink paper ink font-cc text-xl">开始抽奖 (100金币)</button>
    </div>
  </div>

  <!-- 管理 -->
  <div id="pageAdmin" class="hide">
    <div class="p-4 rounded paper">
      <h3 class="text-lg font-bold ink mb-3 font-cc">管理员系统</h3>
      <p class="ink font-cc">管理功能开发中...</p>
    </div>
  </div>
</main>

<!-- 设置弹窗 -->
<div id="setupModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="p-6 rounded paper max-w-md w-full">
    <h3 class="text-xl font-bold ink mb-3 font-cc">欢迎加入！</h3>
    <input type="text" id="setupName" placeholder="昵称" class="w-full px-3 py-2 rounded border-ink paper ink mb-2">
    <input type="text" id="setupIG" placeholder="IG账号" class="w-full px-3 py-2 rounded border-ink paper ink mb-2">
    <button onclick="completeSetup()" class="w-full px-4 py-2 rounded border-ink paper ink font-cc">完成</button>
  </div>
</div>

<!-- 欢迎横幅 -->
<div id="welcomeBox" class="hide p-4 rounded paper text-center mb-4">
  <h2 class="text-xl font-bold ink font-cc">欢迎回来，<span id="welcomeName"></span>！</h2>
</div>

<script>
  function spinWheel(){ if(!meData.coins||meData.coins<SPIN_COST){ toast('金币不足'); return; } db.collection('users').doc(me.uid).update({coins:firebase.firestore.FieldValue.increment(-SPIN_COST)}); const prizes=['10金币','20金币','50金币','100金币','谢谢参与']; const p=prizes[Math.floor(Math.random()*prizes.length)]; if(p!='谢谢参与'){ const amt=parseInt(p); db.collection('users').doc(me.uid).update({coins:firebase.firestore.FieldValue.increment(amt)}); toast('获得 '+p); }else{ toast('谢谢参与'); } document.getElementById('wheelCoins').textContent=meData.coins; }
  function submitPost(e){ e.preventDefault(); const c=e.target.content.value.trim(); if(!c)return; db.collection('posts').add({userId:me.uid,userName:meData.displayName,content:c,time:Date.now(),status:'pending'}); toast('投稿成功'); e.target.content.value=''; }
</script>
</body>
</html>
