<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐤 小鸡手抄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#FFB800', secondary: '#FF6B35' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive; }
    .font-cc { font-family: 'Ma Shan Zheng', cursive; }
    input, textarea { font-family: 'Noto Sans SC', sans-serif !important; }
    .hide { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
    #wheelContainer {
      overflow: hidden;
    }
    #wheelContainer > div {
      position: absolute;
      inset: 0;
    }
    #wheelResult {
      animation: popIn 0.5s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .card-flip {
      animation: cardFlip 0.8s ease-out;
    }
    @keyframes cardFlip {
      0% { transform: rotateY(180deg) scale(0.5); opacity: 0; }
      50% { transform: rotateY(90deg) scale(1.1); }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }
    .card-glow-gold { box-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500; }
    .card-glow-red { box-shadow: 0 0 30px #FF4444, 0 0 60px #FF0000; }
    .card-glow-pink { box-shadow: 0 0 20px #FF69B4, 0 0 40px #FF1493; }
    .card-glow-gray { box-shadow: 0 0 10px #888; }
    .mini-card {
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .mini-card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 to-orange-50">

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hide');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

function fmtPts(n) {
  if (n >= 1000000000) return (n/1000000000).toFixed(1).replace(/\.0$/,'') + 'B';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + 'W';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n;
}

// 登录
async function signIn() {
  try {

auth.onAuthStateChanged(async (user) => {
  me = user;
  
  if (user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    
    const isBuiltInAdmin = user.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    
    if (snap.exists) {
      meData = snap.data();
      if (isBuiltInAdmin && !meData.isAdmin) {
        await ref.update({ isAdmin: true });
        meData.isAdmin = true;
      }
    } else {
      meData = {
        displayName: user.displayName || '粉丝',
        email: user.email,
        photoURL: user.photoURL,
        title: '新进粉丝',
        igAccount: '',
        points: 0,
        coins: 500,
        inventory: [],
        lastCheckIn: null,
        isTopFan: false,
        isAdmin: isBuiltInAdmin
      };
      await ref.set(meData);
    }
    
    document.getElementById('loginBox').classList.add('hide');
    document.getElementById('userBox').classList.remove('hide');
    document.getElementById('postBox').classList.remove('hide');
    document.getElementById('welcomeBox').classList.remove('hide');
    document.getElementById('welcomeName').textContent = meData.displayName;
    document.getElementById('userImg').src = meData.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>';
    document.getElementById('userName').textContent = meData.displayName;
    document.getElementById('userTitle').textContent = meData.title;
    document.getElementById('userPoints').textContent = fmtPts(meData.points || 0);
    document.getElementById('userCoins').textContent = meData.coins || 0;
    document.getElementById('postIG').value = meData.igAccount || '';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnLogin').classList.add('hide');
    document.getElementById('btnLogout').classList.remove('hide');
    document.getElementById('btnShop').classList.remove('hide');
    updateCheckInBtn();
    checkDailyReward();
    
    if (meData.isAdmin) {
      document.getElementById('btnAdmin').classList.remove('hide');
    }
    
    if (!meData.igAccount) {
      document.getElementById('setupModal').classList.remove('hide');
      document.getElementById('setupName').value = meData.displayName;
    }
    
    toast('登录成功！');
  } else {
    meData = null;
    document.getElementById('loginBox').classList.remove('hide');
    document.getElementById('userBox').classList.add('hide');
    document.getElementById('postBox').classList.add('hide');
    document.getElementById('welcomeBox').classList.add('hide');

    document.getElementById('btnLogout').classList.add('hide');

});

// 载入排行榜
function loadRank() {
  db.collection('users')
    .orderBy('points', 'desc')
    .limit(10)
    .onSnapshot(snap => {
      const box = document.getElementById('rankBox');
      box.innerHTML = '';
      let rank = 1;
      
      snap.forEach(doc => {
        const u = doc.data();
        if (u.points <= 0 && !u.isTopFan) return;
        
        const icon = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '🏆';
        const title = rank === 1 ? '冠军' : rank === 2 ? '亚军' : rank === 3 ? '季军' : '';
        const bg = rank === 1 ? 'from-yellow-400 to-orange-400 text-white' : 'bg-gray-100';
        
        const item = `
          <div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-r ${bg}">
            <span class="text-2xl flex-shrink-0">${icon}</span>
            <img src="${u.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>'}" class="w-10 h-10 rounded-full flex-shrink-0">
            <div class="flex-1 min-w-0">
              <span class="font-bold text-lg block truncate">${u.displayName}</span>
              ${u.igAccount ? `<span class="text-sm opacity-80 block truncate">@${u.igAccount}</span>` : ''}
              ${title ? `<span class="text-sm opacity-80 block">${title}粉丝</span>` : ''}
              ${u.isTopFan ? `<span class="text-sm text-red-500 block">⭐ 置顶粉丝</span>` : ''}
            </div>
            <div class="text-right flex-shrink-0">
              <span class="font-bold text-lg">${fmtPts(u.points)}</span>
            </div>
          </div>
        `;
        
        box.insertAdjacentHTML('beforeend', item);
        rank++;
      });
      
      if (box.innerHTML === '') {
        box.innerHTML = '<p class="text-center text-gray-500 py-8 font-cc text-lg">还没有人上榜，快去聊天吧！</p>';
      }
    });
}

const WHEEL_ITEMS = [
  { label: '50💰', weight: 30, type: 'coins', value: 50 },
  { label: '100💰', weight: 25, type: 'coins', value: 100 },
  { label: '200💰', weight: 15, type: 'coins', value: 200 },
  { label: '谢谢参与', weight: 15, type: 'none', value: 0 },
  { label: '稀有称号', weight: 5, type: 'title', value: '幸运星' },
  { label: '神秘礼盒', weight: 5, type: 'item', value: '神秘礼盒' },
  { label: '500💰', weight: 4, type: 'coins', value: 500 },
  { label: '2000💰', weight: 1, type: 'coins', value: 2000 }
];

let currentRotation = 0;

function initWheel() {
  const container = document.getElementById('wheelContainer');
  if (!container) return;
  
  const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'];
  const sliceAngle = 360 / WHEEL_ITEMS.length;
  
  container.style.background = `conic-gradient(${WHEEL_ITEMS.map((item, i) => 
    `${colors[i]} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg`
  ).join(', ')})`;
  
  container.innerHTML = WHEEL_ITEMS.map((item, i) => `
    <div class="absolute inset-0 flex items-center justify-center" style="transform: rotate(${i * sliceAngle + sliceAngle / 2}deg);">
      <div class="absolute top-4 text-white text-sm font-bold drop-shadow-lg" style="transform: rotate(-${i * sliceAngle + sliceAngle / 2}deg);">
        ${item.label}
      </div>
    </div>
  `).join('') + `
    <div class="absolute inset-0 flex items-center justify-center">

function updateWheelCoins() {
  document.getElementById('wheelCoins').textContent = meData.coins || 0;
  const btn = document.getElementById('btnSpin');
  if (btn) btn.disabled = (meData.coins || 0) < SPIN_COST;
}

function getRandomPrize() {
  const totalWeight = WHEEL_ITEMS.reduce((sum, item) => sum + item.weight, 0);
  let random = Math.random() * totalWeight;
  for (const item of WHEEL_ITEMS) {
    random -= item.weight;
    if (random <= 0) return item;
  }
  return WHEEL_ITEMS[0];
}

async function spinWheel() {
  if (isSpinning) return;
  if ((meData.coins || 0) < SPIN_COST) {
    toast('金币不足！');
    return;
  }
  
  if (!me) {
    toast('请先登录！');
    return;
  }
  
  isSpinning = true;
  const btn = document.getElementById('btnSpin');
  btn.disabled = true;
  btn.textContent = '🎡 抽奖中...';
  
  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-SPIN_COST)
  });
  meData.coins -= SPIN_COST;
  document.getElementById('wheelCoins').textContent = meData.coins;
  document.getElementById('userCoins').textContent = meData.coins;
  
  const prize = getRandomPrize();
  const sliceAngle = 360 / WHEEL_ITEMS.length;
  const prizeIndex = WHEEL_ITEMS.indexOf(prize);
  const targetAngle = prizeIndex * sliceAngle + sliceAngle / 2;
  
  const container = document.getElementById('wheelContainer');
  const extraSpins = 5 * 360;
  const newRotation = currentRotation + extraSpins + targetAngle;
  
  container.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
  container.style.transform = `rotate(${newRotation}deg)`;
  currentRotation = newRotation;
  
  setTimeout(() => {
    isSpinning = false;
    btn.textContent = '🎲 开始抽奖！';
    btn.disabled = (meData.coins || 0) < SPIN_COST;
    showWheelResult(prize);
  }, 4100);
}

async function showWheelResult(prize) {
  const resultBox = document.getElementById('wheelResult');
  const prizeText = document.getElementById('wheelPrize');
  const prizeSub = document.getElementById('wheelPrizeSub');
  resultBox.classList.remove('hide');
  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  let displayLabel = prize.label;
  let subText = '';
  if (prize.type === 'coins' && prize.value >= 1000) {
    displayLabel = `${prize.value / 1000}K 💰`;
  }
  prizeText.textContent = displayLabel;
  
  if (prize.type === 'coins' && prize.value > 0) {
    subText = `+${prize.value} 金币已发放到你的账户`;
    await db.collection('users').doc(me.uid).update({
      coins: firebase.firestore.FieldValue.increment(prize.value)
    });
    meData.coins += prize.value;
    document.getElementById('userCoins').textContent = meData.coins;
    updateWheelCoins();
  } else if (prize.type === 'title') {
    subText = `恭喜获得新称号！`;
    await db.collection('users').doc(me.uid).update({ title: prize.value });
    meData.title = prize.value;
    document.getElementById('userTitle').textContent = prize.value;
  } else if (prize.type === 'item') {
    subText = `已放入你的背包`;
    const inv = meData.inventory || [];
    inv.push({ name: prize.value, time: Date.now() });
    await db.collection('users').doc(me.uid).update({ inventory: inv });
    meData.inventory = inv;
  }
  prizeSub.textContent = subText;
}

async function drawCard(source = 'shop') {
  if (!me) { toast('请先登录'); return; }
  
  const quality = drawCardQuality(source);
  const templates = CARD_TEMPLATES[quality];
  const template = templates[Math.floor(Math.random() * templates.length)];
  
  const stats = generateCardStats(quality);
  const typeCount = Math.floor(Math.random() * 5) + 1;
  const types = shuffleArray([...CARD_TYPES]).slice(0, typeCount);
  
  const cardRef = await db.collection('cards').add({
    ownerId: me.uid,
    ownerName: meData.displayName,
    templateId: template.id,
    quality,
    name: template.name,
    desc: template.desc,
    types,
    lv: 1,
    ...stats,
    time: Date.now()
  });
  
  return { id: cardRef.id, templateId: template.id, quality, name: template.name, desc: template.desc, types, lv: 1, ...stats };
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function drawCardQuality(source) {
  const rand = Math.random() * 100;
  
  if (source === 'pack') {
    if (rand < 1) return 'gold';
    if (rand < 6) return 'red';
    if (rand < 35) return 'pink';
    return 'gray';
  } else {
    return rand < 0.35 ? 'pink' : 'gray';
  }
}

function generateCardStats(quality) {
  const base = { gold: 150, red: 100, pink: 50, gray: 20 }[quality];
  const variance = { gold: 100, red: 50, pink: 30, gray: 15 }[quality];
  
  return {
    atk: base + Math.floor(Math.random() * variance),
    def: base + Math.floor(Math.random() * variance),
    hp: base * 3 + Math.floor(Math.random() * variance * 3),
    speed: 10 + Math.floor(Math.random() * 50),
    lucky: 5 + Math.floor(Math.random() * 30),
    crit: 5 + Math.floor(Math.random() * 25),
    dodge: 5 + Math.floor(Math.random() * 20),
    regen: 1 + Math.floor(Math.random() * 10)
  };
}

async function drawCardFromShop(type) {
  const cost = type === 'single' ? 50 : 400;
  const count = type === 'single' ? 1 : 10;
  
  if ((meData.coins || 0) < cost) {
    toast('金币不足！');
    return;
  }
  
  if (!confirm(`确定花费 ${cost} 金币进行${type === 'single' ? '单抽' : '十连抽'}？`)) return;
  
  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-cost)
  });
  meData.coins -= cost;
  document.getElementById('userCoins').textContent = meData.coins;
  updateWheelCoins();
  
  if (type === 'single') {
    const card = await drawCard('shop');
    showCardResult(card);
  } else {
    const cards = [];
    for (let i = 0; i < count; i++) {
      const card = await drawCard('pack');
      cards.push(card);
    }
    showTenDrawResult(cards);
  }
}

async function buyOfficialItem(itemId, price, name) {

  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-price),

async function bidItem(itemId, currentPrice) {
  const bid = prompt(`当前价格 ${currentPrice}，请输入你的出价（需高于当前价格）：`);
  if (!bid) return;
  const bidNum = parseInt(bid);
  if (isNaN(bidNum) || bidNum <= currentPrice) {
    toast('出价需高于当前价格');
    return;
  }
  if ((meData.coins || 0) < bidNum) {
    toast('金币不足！');
    return;
  }
  await db.collection('marketplace').doc(itemId).update({
    highestBid: bidNum,
    highestBidder: meData.displayName,
    highestBidderId: me.uid
  });
  toast('出价成功！');
  loadMarket();
}

async function buyNowItem(itemId, price, name, sellerId, type, cardId) {
  if (sellerId === me?.uid) { toast('不能购买自己的商品'); return; }
  if ((meData.coins || 0) < price) {
    toast('金币不足！');
    return;
  }
  if (!confirm(`确定花费 ${price} 金币购买「${name}」？`)) return;
  
  await db.collection('users').doc(me.uid).update({
    coins: firebase.firestore.FieldValue.increment(-price)
  });
  await db.collection('users').doc(sellerId).update({
    coins: firebase.firestore.FieldValue.increment(price)
  });
  
  if (type === 'card' && cardId) {
    await db.collection('cards').doc(cardId).update({
      ownerId: me.uid,
      ownerName: meData.displayName
    });
  }
  
  await db.collection('marketplace').doc(itemId).update({
    status: 'sold',
    buyerId: me.uid,
    buyerName: meData.displayName
  });
  meData.coins -= price;
  document.getElementById('userCoins').textContent = meData.coins;
  toast('购买成功！');
  loadMarket();
}

  const item = { name, emoji: '📦', price, sellerId: me.uid, sellerName: meData.displayName, time: Date.now(), status: 'selling' };
  await db.collection('marketplace').add(item);
  toast('已上架到玩家市集！');
  document.getElementById('sellName').value = '';
  document.getElementById('sellPrice').value = '';

async function useItem(index) {
  const inv = meData.inventory || [];
  if (index >= inv.length) return;
  const item = inv[index];
  toast(`使用了「${item.name}」`);
  inv.splice(index, 1);
  await db.collection('users').doc(me.uid).update({ inventory: inv });
  meData.inventory = inv;
  loadMyItems();
}

async function giftItem(index) {
  const inv = meData.inventory || [];
  if (index >= inv.length) return;
  const item = inv[index];
  const target = prompt('请输入对方的昵称：');
  if (!target) return;
  
  const snap = await db.collection('users').where('displayName', '==', target).limit(1).get();
  if (snap.empty) { toast('未找到该用户'); return; }
  const targetDoc = snap.docs[0];
  
  inv.splice(index, 1);
  const targetInv = targetDoc.data().inventory || [];
  targetInv.push(item);
  
  await db.collection('users').doc(me.uid).update({ inventory: inv });
  await db.collection('users').doc(targetDoc.id).update({ inventory: targetInv });
  meData.inventory = inv;
  toast(`已将「${item.name}」送给 ${target}！`);
  loadMyItems();
}

        <button onclick="quickCoin(500)" class="bg-yellow-100 text-yellow-700 px-4 py-1 rounded-lg font-cc text-sm">+500</button>
        <button onclick="quickCoin(1000)" class="bg-yellow-100 text-yellow-700 px-4 py-1 rounded-lg font-cc text-sm">+1K</button>
        <button onclick="quickCoin(5000)" class="bg-yellow-100 text-yellow-700 px-4 py-1 rounded-lg font-cc text-sm">+5K</button>
      </div>
    </div>
    <div id="coinList" class="space-y-2"></div>
  `;
  
  db.collection('users').orderBy('displayName').get().then(snap => {
    const select = document.getElementById('coinUser');
    snap.forEach(doc => {
      const u = doc.data();
      const opt = document.createElement('option');
      opt.value = doc.id;
      opt.textContent = `${u.displayName} (${u.coins || 0} 💰)`;
      select.appendChild(opt);
    });
  });
  
  loadCoinHistory();
}

async function quickCoin(amount) {
  document.getElementById('coinAmount').value = amount;
  giveCoins();
}

async function giveCoins() {
  const userId = document.getElementById('coinUser').value;
  const amount = parseInt(document.getElementById('coinAmount').value);
  
  if (!userId) { toast('请选择用户'); return; }
  if (!amount || amount <= 0) { toast('请输入有效数量'); return; }
  
  await db.collection('users').doc(userId).update({
    coins: firebase.firestore.FieldValue.increment(amount)
  });
  
  const snap = await db.collection('users').doc(userId).get();
  const userName = snap.data().displayName;
  
  await db.collection('coinHistory').add({
    adminId: me.uid,
    adminName: meData.displayName,
    targetId: userId,
    targetName: userName,
    amount,
    time: Date.now()
  });
  
  document.getElementById('coinAmount').value = '';
  toast(`已发放 ${amount} 金币给 ${userName}`);
  loadCoinHistory();
  loadCoinUserSelect();
}

function loadCoinUserSelect() {
  const select = document.getElementById('coinUser');
  if (!select) return;
  select.innerHTML = '<option value="">选择用户...</option>';
  db.collection('users').orderBy('displayName').get().then(snap => {
    snap.forEach(doc => {
      const u = doc.data();
      const opt = document.createElement('option');
      opt.value = doc.id;
      opt.textContent = `${u.displayName} (${u.coins || 0} 💰)`;
      select.appendChild(opt);
    });
  });
}

function loadCoinHistory() {
  const box = document.getElementById('coinList');
  db.collection('coinHistory').orderBy('time', 'desc').limit(20).get().then(snap => {
    if (snap.empty) {
      box.innerHTML = '<p class="text-center text-gray-400 py-4 font-cc">暂无记录</p>';
      return;
    }
    box.innerHTML = '<h4 class="font-bold font-cc mb-2">发放记录</h4>';
    snap.forEach(doc => {
      const c = doc.data();
      const date = new Date(c.time).toLocaleString('zh-TW');
      box.innerHTML += `
        <div class="flex items-center gap-3 p-2 bg-gray-50 rounded">
          <span class="text-sm text-gray-500 flex-1">${date}</span>
          <span class="font-cc">${c.adminName} → ${c.targetName}</span>
          <span class="text-green-500 font-bold font-cc">+${c.amount}</span>
        </div>
      `;
    });
  });
}

        <button onclick="filterAdminCards('pink')" class="admin-card-filter px-4 py-1 rounded-full bg-gray-200 font-cc text-sm" data-filter="pink">粉(8)</button>

      <div id="adminCardList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

let currentCardFilter = 'all';

function filterAdminCards(filter) {
  currentCardFilter = filter;
  document.querySelectorAll('.admin-card-filter').forEach(btn => {
    if (btn.dataset.filter === filter) {
      btn.classList.remove('bg-gray-200');
      btn.classList.add('bg-yellow-400');
    } else {
      btn.classList.remove('bg-yellow-400');
      btn.classList.add('bg-gray-200');
    }
  });
  
  db.collection('cards').orderBy('time', 'desc').get().then(snap => {
    let cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (filter !== 'all') {
      cards = cards.filter(c => c.quality === filter);
    }
    
    const box = document.getElementById('adminCardList');
    if (cards.length === 0) {
      box.innerHTML = '<p class="col-span-full text-center text-gray-400 py-8 font-cc">暂无卡牌</p>';
      return;
    }
    
    box.innerHTML = cards.map(card => {
      const q = CARD_QUALITIES[card.quality] || CARD_QUALITIES.gray;
      return `
        <div class="p-3 rounded-xl ${q.bg} text-white text-center">
          <div class="flex justify-between items-start">
            <span class="text-xs bg-black/20 px-2 rounded">${q.name}</span>
            <button onclick="deleteCard('${card.id}')" class="text-xs bg-red-500 px-2 rounded hover:bg-red-600">删除</button>
          </div>
          <img src="cards/${card.templateId}.png" class="w-16 h-16 mx-auto object-contain my-2" onerror="this.style.display='none'">
          <div class="text-sm font-bold truncate">${card.name}</div>
          <div class="text-xs mt-1">持有: ${card.ownerName}</div>
          <div class="flex justify-center gap-1 text-xs mt-1">
            <span>⚔️${card.atk}</span>
            <span>🛡️${card.def}</span>
            <span>❤️${card.hp}</span>
          </div>
        </div>
      `;
    }).join('');
  });
}

async function createCustomCard() {
  if (!meData?.isAdmin) { toast('只有管理员可以创建'); return; }
  
  const selected = document.getElementById('customCardTemplate').value;
  const [quality, templateId] = selected.split('|');
  const targetUserId = document.getElementById('customCardUser').value || me.uid;
  
  const template = CARD_TEMPLATES[quality].find(t => t.id === parseInt(templateId));
  if (!template) { toast('模板不存在'); return; }
  
  const stats = generateCardStats(quality);
  const typeCount = Math.floor(Math.random() * 5) + 1;
  const types = shuffleArray([...CARD_TYPES]).slice(0, typeCount);
  
  await db.collection('cards').add({
    ownerId: targetUserId,
    ownerName: targetUserId === me.uid ? meData.displayName : (await db.collection('users').doc(targetUserId).get()).data().displayName,
    templateId: template.id,
    quality,
    name: template.name,
    desc: template.desc,
    types,
    lv: 1,
    ...stats,
    time: Date.now()
  });
  
  toast('卡牌创建成功！');
  filterAdminCards(currentCardFilter);
}

async function deleteCard(cardId) {
  if (!confirm('确定删除这张卡牌？')) return;
  await db.collection('cards').doc(cardId).delete();
  toast('卡牌已删除');
  filterAdminCards(currentCardFilter);
}
