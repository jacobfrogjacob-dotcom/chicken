<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐤 小雞手抄 - IG 互動粉絲網站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FFB800',
            secondary: '#FF6B35',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
    .hide { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 to-orange-50">
  <!-- Toast 通知 -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg z-50 opacity-0 transition-opacity duration-300"></div>

  <!-- Header -->
  <header class="bg-gradient-to-r from-yellow-400 to-orange-400 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-white flex items-center gap-3">
            <span class="text-4xl">🐤</span>
            小雞手抄
          </h1>
          <p class="text-yellow-100 mt-1">IG 互動粉絲網站</p>
        </div>
        <div class="flex gap-2">
          <button onclick="showSection('home')" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl transition-colors text-white" title="首頁">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          </button>
          <button onclick="showSection('admin')" id="adminBtn" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl transition-colors text-white" title="管理員">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- 登入區塊 -->
    <div id="loginSection" class="bg-white rounded-2xl shadow-lg p-8 text-center mb-6">
      <div class="mb-6">
        <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-yellow-400 to-orange-400 rounded-full flex items-center justify-center">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">歡迎來到小雞手抄</h2>
        <p class="text-gray-600">登入後即可參與聊天互動</p>
      </div>
      <button onclick="signInWithGoogle()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 hover:from-yellow-500 hover:to-orange-500 text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-105 shadow-lg">
        使用 Google 登入
      </button>
    </div>

    <!-- 用戶資訊區塊 -->
    <div id="userSection" class="hide bg-white rounded-2xl shadow-lg p-6 mb-6">
      <div class="flex items-center gap-4 mb-4">
        <img id="userAvatar" src="" alt="" class="w-16 h-16 rounded-full border-4 border-yellow-400">
        <div>
          <h2 id="userName" class="text-xl font-bold text-gray-800"></h2>
          <span id="userTitle" class="inline-block bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-3 py-1 rounded-full text-sm font-medium"></span>
        </div>
        <div class="ml-auto flex gap-2">
          <button onclick="showProfileModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 px-4 rounded-lg transition-colors text-sm">編輯資料</button>
          <button onclick="logout()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded-lg transition-colors text-sm">登出</button>
        </div>
      </div>
      <div class="flex items-center gap-4 text-sm text-gray-600">
        <span>📊 <strong id="userPoints">0</strong> 積分</span>
        <span>📧 <span id="userEmail"></span></span>
      </div>
    </div>

    <!-- 主內容區 -->
    <div id="home" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- 左側 -->
      <div class="lg:col-span-2 space-y-6">
        <!-- 聊天區 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-xl flex items-center gap-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
              即時聊天
            </h2>
          </div>
          <div id="chatMessages" class="h-96 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
          <form onsubmit="sendMessage(event)" class="p-4 border-t bg-white">
            <div class="flex gap-2">
              <input type="text" id="chatInput" placeholder="輸入訊息..." class="flex-1 px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 disabled:bg-gray-100">
              <button type="submit" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white p-2 rounded-xl hover:from-yellow-500 hover:to-orange-500 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
              </button>
            </div>
          </form>
        </div>

        <!-- 投稿區 -->
        <div id="submissionSection" class="hide bg-white rounded-2xl shadow-lg overflow-hidden">
          <div id="submissionNotice" class="bg-yellow-50 border-b border-yellow-200 p-4">
            <div class="flex items-start gap-3">
              <svg class="w-6 h-6 text-yellow-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              <div class="flex-1">
                <h3 class="font-bold text-yellow-800 mb-1">投稿注意事項</h3>
                <p class="text-yellow-700 text-sm mb-2">在投稿前，請先確認您已同意我的協作者邀請，否則可能無法正常收到訊息通知。</p>
                <button onclick="dismissNotice()" class="text-sm text-yellow-600 hover:text-yellow-800 underline">我知道了</button>
              </div>
            </div>
          </div>
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-xl flex items-center gap-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
              粉絲投稿
            </h2>
          </div>
          <form onsubmit="submitPost(event)" class="p-6 space-y-4">
            <div>
              <label class="block text-gray-700 font-medium mb-2">IG 帳號 *</label>
              <input type="text" id="igAccount" placeholder="輸入你的 IG 帳號" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400" required>
            </div>
            <div>
              <label class="block text-gray-700 font-medium mb-2">投稿內容 *</label>
              <textarea id="submissionContent" placeholder="分享你的想法... (至少 10 個字)" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 resize-none" required></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 hover:from-yellow-500 hover:to-orange-500 text-white font-bold py-3 px-6 rounded-xl transition-all">
              送出投稿
            </button>
          </form>
        </div>
      </div>

      <!-- 右側 -->
      <div class="space-y-6">
        <!-- 排行榜 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-xl flex items-center gap-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
              粉絲排行榜
            </h2>
          </div>
          <div id="leaderboard" class="p-4 space-y-3"></div>
        </div>
      </div>
    </div>

    <!-- 管理員區 -->
    <div id="admin" class="hide">
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-gradient-to-r from-gray-700 to-gray-900 p-4">
          <h2 class="text-white font-bold text-xl flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            管理員系統
          </h2>
        </div>
        
        <!-- 標籤導航 -->
        <div class="flex border-b overflow-x-auto">
          <button onclick="showAdminTab('messages')" id="tabMessages" class="flex items-center gap-2 px-4 py-3 font-medium text-yellow-500 border-b-2 border-yellow-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            訊息管理
          </button>
          <button onclick="showAdminTab('users')" id="tabUsers" class="flex items-center gap-2 px-4 py-3 font-medium text-gray-500 hover:text-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            用戶管理
          </button>
          <button onclick="showAdminTab('submissions')" id="tabSubmissions" class="flex items-center gap-2 px-4 py-3 font-medium text-gray-500 hover:text-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            投稿審核
          </button>
          <button onclick="showAdminTab('settings')" id="tabSettings" class="flex items-center gap-2 px-4 py-3 font-medium text-gray-500 hover:text-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
            UI 設定
          </button>
        </div>

        <!-- 訊息管理 -->
        <div id="adminMessages" class="p-4 space-y-3"></div>

        <!-- 用戶管理 -->
        <div id="adminUsers" class="hide p-4 space-y-3"></div>

        <!-- 投稿審核 -->
        <div id="adminSubmissions" class="hide p-4 space-y-3"></div>

        <!-- UI 設定 -->
        <div id="adminSettings" class="hide p-4 space-y-4">
          <h3 class="font-bold text-lg">公告訊息</h3>
          <textarea id="announcementInput" placeholder="輸入公告內容..." rows="3" class="w-full px-4 py-2 border rounded-xl"></textarea>
          <button onclick="saveSettings()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl">儲存設定</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 編輯資料 Modal -->
  <div id="profileModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
      <h3 class="text-xl font-bold mb-4">編輯個人資料</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-gray-700 font-medium mb-2">暱稱</label>
          <input type="text" id="editName" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-2">IG 帳號</label>
          <input type="text" id="editIG" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>
      </div>
      <div class="flex gap-2 mt-6">
        <button onclick="saveProfile()" class="flex-1 bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-2 rounded-xl">儲存</button>
        <button onclick="closeProfileModal()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2 rounded-xl">取消</button>
      </div>
    </div>
  </div>

  <script>
    // ========== Firebase 設定 ==========
    // 請替換為你的 Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyC9ARCgaoXfLFRVQb3djEhxN7ephFTlZ-U",
      authDomain: "chicken-33a60.firebaseapp.com",
      projectId: "chicken-33a60",
      storageBucket: "chicken-33a60.firebasestorage.app",
      messagingSenderId: "646431742714",
      appId: "1:646431742714:web:47d9a7f456843a6b9bc743"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentUser = null;
    let currentUserData = null;
    let messagesUnsubscribe = null;
    let usersUnsubscribe = null;
    let submissionsUnsubscribe = null;

    // ========== Toast 通知 ==========
    function showToast(message, duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, duration);
    }

    // ========== Google 登入 ==========
    let isLoggingIn = false;
    async function signInWithGoogle() {
      if (isLoggingIn) return;
      isLoggingIn = true;
      
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      
      try {
        await auth.signInWithRedirect(provider);
      } catch (error) {
        showToast('登入失敗：' + error.message);
        isLoggingIn = false;
      }
    }
    
    // 監聽 redirect 結果
    auth.getRedirectResult().then((result) => {
      isLoggingIn = false;
    }).catch((error) => {
      isLoggingIn = false;
    });

    // ========== 登出 ==========
    async function logout() {
      try {
        await auth.signOut();
      } catch (error) {
        showToast('登出失敗');
      }
    }

    // ========== 認證狀態監聽 ==========
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        await loadUserData(user);
        document.getElementById('loginSection').classList.add('hide');
        document.getElementById('userSection').classList.remove('hide');
        document.getElementById('submissionSection').classList.remove('hide');
        document.getElementById('chatInput').disabled = false;
        if (currentUserData?.isAdmin) {
          document.getElementById('adminBtn').classList.remove('hide');
        }
        loadMessages();
        loadLeaderboard();
      } else {
        currentUser = null;
        currentUserData = null;
        document.getElementById('loginSection').classList.remove('hide');
        document.getElementById('userSection').classList.add('hide');
        document.getElementById('submissionSection').classList.add('hide');
        document.getElementById('adminBtn').classList.add('hide');
        document.getElementById('chatInput').disabled = true;
        if (messagesUnsubscribe) messagesUnsubscribe();
        if (usersUnsubscribe) usersUnsubscribe();
        if (submissionsUnsubscribe) submissionsUnsubscribe();
      }
    });

    // ========== 載入用戶資料 ==========
    async function loadUserData(user) {
      const userRef = db.collection('users').doc(user.uid);
      const userSnap = await userRef.get();
      
      if (userSnap.exists) {
        currentUserData = userSnap.data();
      } else {
        const newUserData = {
          displayName: user.displayName || '匿名粉絲',
          email: user.email || '',
          photoURL: user.photoURL || '',
          title: '新進粉絲',
          igAccount: '',
          points: 0,
          isTopFan: false,
          isAdmin: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        await userRef.set(newUserData);
        currentUserData = newUserData;
      }
      
      updateUserUI();
    }

    // ========== 更新用戶 UI ==========
    function updateUserUI() {
      if (!currentUserData) return;
      document.getElementById('userAvatar').src = currentUserData.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ddd"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
      document.getElementById('userName').textContent = currentUserData.displayName;
      document.getElementById('userTitle').textContent = currentUserData.title;
      document.getElementById('userPoints').textContent = currentUserData.points || 0;
      document.getElementById('userEmail').textContent = currentUserData.email;
      document.getElementById('igAccount').value = currentUserData.igAccount || '';
    }

    // ========== 聊天功能 ==========
    function loadMessages() {
      if (messagesUnsubscribe) messagesUnsubscribe();
      
      messagesUnsubscribe = db.collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot((snapshot) => {
          const chatDiv = document.getElementById('chatMessages');
          chatDiv.innerHTML = '';
          
          snapshot.forEach((doc) => {
            const msg = doc.data();
            const isOwn = msg.userId === currentUser?.uid;
            const time = msg.timestamp?.toDate()?.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }) || '';
            
            chatDiv.innerHTML += `
              <div class="flex gap-3 p-3 rounded-xl ${msg.isPinned ? 'bg-yellow-100 border-2 border-yellow-400' : 'bg-white'} ${isOwn ? 'flex-row-reverse' : ''}">
                ${msg.isPinned ? '<svg class="w-4 h-4 text-yellow-500 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>' : ''}
                <img src="${msg.userAvatar || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ddd"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'}" alt="${msg.userName}" class="w-10 h-10 rounded-full flex-shrink-0">
                <div class="flex-1 ${isOwn ? 'text-right' : ''}">
                  <div class="flex items-center gap-2 mb-1 ${isOwn ? 'justify-end' : ''}">
                    <span class="font-semibold text-gray-800 text-sm">${msg.userName}</span>
                    <span class="text-xs text-gray-400">${time}</span>
                  </div>
                  <p class="text-gray-700 break-words">${msg.content}</p>
                  <div class="flex items-center gap-2 mt-2 ${isOwn ? 'justify-end' : ''}">
                    <button onclick="likeMessage('${doc.id}', ${msg.likes || 0}, ${JSON.stringify(msg.likedBy || [])})" class="flex items-center gap-1 text-sm ${msg.likedBy?.includes(currentUser?.uid) ? 'text-red-500' : 'text-gray-400 hover:text-red-500'}">
                      <svg class="w-4 h-4 ${msg.likedBy?.includes(currentUser?.uid) ? 'fill-current' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                      ${msg.likes || 0}
                    </button>
                  </div>
                </div>
              </div>
            `;
          });
          
          chatDiv.scrollTop = chatDiv.scrollHeight;
        });
    }

    // ========== 發送訊息 ==========
    async function sendMessage(e) {
      e.preventDefault();
      if (!currentUser || !currentUserData) return;
      
      const input = document.getElementById('chatInput');
      const content = input.value.trim();
      if (!content) return;
      
      try {
        await db.collection('messages').add({
          userId: currentUser.uid,
          userName: currentUserData.displayName,
          userAvatar: currentUserData.photoURL,
          content,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          likes: 0,
          isPinned: false,
          likedBy: []
        });
        
        await db.collection('users').doc(currentUser.uid).update({
          points: firebase.firestore.FieldValue.increment(1)
        });
        
        input.value = '';
      } catch (error) {
        showToast('發送失敗');
      }
    }

    // ========== 按讚 ==========
    async function likeMessage(msgId, currentLikes, likedBy) {
      if (!currentUser) return;
      if (likedBy.includes(currentUser.uid)) {
        showToast('已經點過讚了');
        return;
      }
      
      try {
        await db.collection('messages').doc(msgId).update({
          likes: currentLikes + 1,
          likedBy: [...likedBy, currentUser.uid]
        });
      } catch (error) {
        showToast('點讚失敗');
      }
    }

    // ========== 排行榜 ==========
    function loadLeaderboard() {
      if (usersUnsubscribe) usersUnsubscribe();
      
      usersUnsubscribe = db.collection('users')
        .orderBy('points', 'desc')
        .limit(10)
        .onSnapshot((snapshot) => {
          const leaderboard = document.getElementById('leaderboard');
          leaderboard.innerHTML = '';
          
          let rank = 1;
          snapshot.forEach((doc) => {
            const user = doc.data();
            if (user.points <= 0) return;
            
            const rankIcon = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '🏆';
            const rankTitle = rank === 1 ? '冠軍粉絲' : rank === 2 ? '亞軍粉絲' : rank === 3 ? '季軍粉絲' : '';
            const bgClass = rank === 1 ? 'from-yellow-400 to-orange-400 text-white' : rank === 2 ? 'from-gray-300 to-gray-400 text-white' : rank === 3 ? 'from-amber-600 to-amber-700 text-white' : 'from-gray-100 to-gray-200';
            
            leaderboard.innerHTML += `
              <div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-r ${bgClass}">
                <span class="text-2xl">${rankIcon}</span>
                <img src="${user.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ddd"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'}" alt="${user.displayName}" class="w-10 h-10 rounded-full border-2 border-white">
                <div class="flex-1 min-w-0">
                  <span class="font-semibold truncate">${user.displayName}</span>
                  ${rank <= 3 ? `<br><span class="text-sm opacity-90">${rankTitle}</span>` : ''}
                </div>
                <div class="text-right">
                  <span class="font-bold text-lg">${user.points}</span>
                  <span class="text-sm ml-1">分</span>
                </div>
              </div>
            `;
            rank++;
          });
          
          if (leaderboard.innerHTML === '') {
            leaderboard.innerHTML = '<div class="text-center py-8 text-gray-500"><p>還沒有粉絲上榜</p><p class="text-sm">快去聊天互動吧！</p></div>';
          }
        });
    }

    // ========== 投稿功能 ==========
    async function submitPost(e) {
      e.preventDefault();
      if (!currentUser || !currentUserData) return;
      
      const igAccount = document.getElementById('igAccount').value.trim();
      const content = document.getElementById('submissionContent').value.trim();
      const btn = document.getElementById('submitBtn');
      
      if (!igAccount) {
        showToast('請填寫 IG 帳號');
        return;
      }
      if (content.length < 10) {
        showToast('內容需至少 10 個字');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '投稿中...';
      
      try {
        await db.collection('submissions').add({
          userId: currentUser.uid,
          userName: currentUserData.displayName,
          igAccount,
          content,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        showToast('投稿成功！等待審核');
        document.getElementById('submissionContent').value = '';
      } catch (error) {
        showToast('投稿失敗');
      } finally {
        btn.disabled = false;
        btn.textContent = '送出投稿';
      }
    }

    function dismissNotice() {
      localStorage.setItem('submissionNoticeSeen', 'true');
      document.getElementById('submissionNotice').classList.add('hide');
    }

    // ========== 個人資料 ==========
    function showProfileModal() {
      document.getElementById('editName').value = currentUserData.displayName;
      document.getElementById('editIG').value = currentUserData.igAccount || '';
      document.getElementById('profileModal').classList.remove('hide');
    }

    function closeProfileModal() {
      document.getElementById('profileModal').classList.add('hide');
    }

    async function saveProfile() {
      const newName = document.getElementById('editName').value.trim();
      const newIG = document.getElementById('editIG').value.trim();
      
      if (!newName || newName.length < 2 || newName.length > 20) {
        showToast('暱稱需為 2-20 字');
        return;
      }
      
      try {
        await db.collection('users').doc(currentUser.uid).update({
          displayName: newName,
          igAccount: newIG
        });
        
        currentUserData.displayName = newName;
        currentUserData.igAccount = newIG;
        updateUserUI();
        closeProfileModal();
        showToast('資料已更新');
      } catch (error) {
        showToast('儲存失敗');
      }
    }

    // ========== 導航 ==========
    function showSection(section) {
      document.getElementById('home').classList.add('hide');
      document.getElementById('admin').classList.add('hide');
      document.getElementById(section).classList.remove('hide');
      
      if (section === 'admin' && currentUserData?.isAdmin) {
        loadAdminData();
      }
    }

    function showAdminTab(tab) {
      ['Messages', 'Users', 'Submissions', 'Settings'].forEach(t => {
        document.getElementById('admin' + t).classList.add('hide');
        document.getElementById('tab' + t).classList.remove('text-yellow-500', 'border-yellow-500', 'border-b-2');
        document.getElementById('tab' + t).classList.add('text-gray-500');
      });
      
      document.getElementById('admin' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hide');
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('text-gray-500');
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('text-yellow-500', 'border-b-2', 'border-yellow-500');
    }

    // ========== 管理員功能 ==========
    function loadAdminData() {
      loadAdminMessages();
      loadAdminUsers();
      loadAdminSubmissions();
    }

    function loadAdminMessages() {
      db.collection('messages').orderBy('timestamp', 'desc').get().then((snapshot) => {
        const div = document.getElementById('adminMessages');
        div.innerHTML = '';
        
        snapshot.forEach((doc) => {
          const msg = doc.data();
          div.innerHTML += `
            <div class="p-3 rounded-xl ${msg.isPinned ? 'bg-yellow-50 border border-yellow-300' : 'bg-gray-50'}">
              <div class="flex items-start justify-between">
                <div class="flex-1">
                  <div class="flex items-center gap-2">
                    <span class="font-semibold">${msg.userName}</span>
                    ${msg.isPinned ? '<span class="text-xs bg-yellow-200 text-yellow-800 px-2 py-0.5 rounded">置頂</span>' : ''}
                  </div>
                  <p class="text-gray-600 mt-1">${msg.content}</p>
                  <span class="text-xs text-gray-400">❤️ ${msg.likes}</span>
                </div>
                <div class="flex gap-2 ml-4">
                  <button onclick="togglePin('${doc.id}', ${msg.isPinned})" class="p-2 hover:bg-yellow-100 rounded-lg" title="${msg.isPinned ? '取消置頂' : '置頂'}">
                    <svg class="w-4 h-4 ${msg.isPinned ? 'text-yellow-500' : 'text-gray-400'}" fill="currentColor" viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
                  </button>
                  <button onclick="deleteMessage('${doc.id}')" class="p-2 hover:bg-red-100 rounded-lg" title="刪除">
                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>
              </div>
            </div>
          `;
        });
      });
    }

    async function togglePin(msgId, isPinned) {
      await db.collection('messages').doc(msgId).update({ isPinned: !isPinned });
      loadAdminMessages();
    }

    async function deleteMessage(msgId) {
      if (!confirm('確定刪除這則訊息？')) return;
      await db.collection('messages').doc(msgId).delete();
      loadAdminMessages();
    }

    function loadAdminUsers() {
      db.collection('users').get().then((snapshot) => {
        const div = document.getElementById('adminUsers');
        div.innerHTML = '';
        
        snapshot.forEach((doc) => {
          const user = doc.data();
          div.innerHTML += `
            <div class="p-3 rounded-xl bg-gray-50 flex items-center gap-4">
              <img src="${user.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ddd"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'}" alt="${user.displayName}" class="w-10 h-10 rounded-full">
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <span class="font-semibold">${user.displayName}</span>
                  ${user.isTopFan ? '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded">置頂</span>' : ''}
                  ${user.isAdmin ? '<span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded">管理員</span>' : ''}
                </div>
                <div class="flex items-center gap-2 mt-1">
                  <input type="number" value="${user.points}" onchange="updatePoints('${doc.id}', this.value)" class="w-20 px-2 py-1 border rounded text-sm" min="0">
                  <span class="text-sm text-gray-500">分</span>
                </div>
              </div>
              <button onclick="toggleTopFan('${doc.id}', ${user.isTopFan})" class="px-3 py-1 rounded-lg text-sm ${user.isTopFan ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                ${user.isTopFan ? '取消置頂' : '設為置頂'}
              </button>
            </div>
          `;
        });
      });
    }

    async function updatePoints(userId, points) {
      await db.collection('users').doc(userId).update({ points: parseInt(points) || 0 });
      showToast('分數已更新');
    }

    async function toggleTopFan(userId, isTopFan) {
      await db.collection('users').doc(userId).update({ isTopFan: !isTopFan });
      loadAdminUsers();
    }

    function loadAdminSubmissions() {
      db.collection('submissions').orderBy('createdAt', 'desc').get().then((snapshot) => {
        const div = document.getElementById('adminSubmissions');
        div.innerHTML = '';
        
        const pending = snapshot.docs.filter(d => d.data().status === 'pending');
        
        if (pending.length === 0) {
          div.innerHTML = '<p class="text-gray-500 text-center py-4">暫無待審核投稿</p>';
          return;
        }
        
        pending.forEach((doc) => {
          const sub = doc.data();
          const time = sub.createdAt?.toDate()?.toLocaleString('zh-TW') || '';
          
          div.innerHTML += `
            <div class="p-4 rounded-xl bg-gray-50">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <span class="font-semibold">${sub.userName}</span>
                  <span class="text-gray-400 ml-2">@${sub.igAccount}</span>
                </div>
                <span class="text-xs text-gray-400">${time}</span>
              </div>
              <p class="text-gray-700 mb-2">${sub.content}</p>
              <div class="flex gap-2">
                <button onclick="approveSubmission('${doc.id}')" class="flex-1 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 flex items-center justify-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                  核准
                </button>
                <button onclick="rejectSubmission('${doc.id}')" class="flex-1 bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 flex items-center justify-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                  拒絕
                </button>
              </div>
            </div>
          `;
        });
      });
    }

    async function approveSubmission(subId) {
      await db.collection('submissions').doc(subId).update({ status: 'approved' });
      showToast('已核准');
      loadAdminSubmissions();
    }

    async function rejectSubmission(subId) {
      await db.collection('submissions').doc(subId).update({ status: 'rejected' });
      showToast('已拒絕');
      loadAdminSubmissions();
    }

    async function saveSettings() {
      const announcement = document.getElementById('announcementInput').value;
      await db.collection('settings').doc('config').set({
        announcement,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      showToast('設定已儲存');
    }

    // 檢查是否看過投稿提示
    if (localStorage.getItem('submissionNoticeSeen')) {
      document.getElementById('submissionNotice')?.classList.add('hide');
    }
  </script>
</body>
</html>
