<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐤 小雞手抄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#FFB800', secondary: '#FF6B35' }

  </script>
  <style>
    * { font-family: 'Ma Shan Zheng', 'Noto Sans TC', cursive; }
    body { font-family: 'Ma Shan Zheng', cursive; }

    .hide { display: none !important; }

    ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 to-orange-50">

<div id="toast" class="hide fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl z-50 text-lg"></div>

<!-- 公告橫幅 -->
<div id="announceBanner" class="hide bg-gradient-to-r from-blue-500 to-purple-500 text-white py-3">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
    <p id="announceText" class="text-lg"></p>
    <button onclick="closeAnnounce()" class="text-white/80 hover:text-white">✕</button>
  </div>
</div>

<!-- Header -->
<header class="bg-gradient-to-r from-yellow-400 to-orange-400 shadow-lg">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between">
      <h1 class="text-4xl font-bold text-white">
        <span class="text-5xl">🐤</span> 小雞手抄
      </h1>
      <div class="flex gap-2">
        <button onclick="showPage('home')" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white text-lg">首頁</button>
        <button onclick="showPage('rank')" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white text-lg">排行</button>
        <button onclick="showPage('admin')" id="btnAdmin" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white text-lg">管理</button>
        <button onclick="logout()" id="btnLogout" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white text-lg">登出</button>
        <button onclick="signIn()" id="btnLogin" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white text-lg">登入</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

  <!-- 歡迎橫幅 -->
  <div id="welcomeBox" class="hide bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 rounded-2xl p-6 mb-6 text-white text-center text-2xl">
    🎉 歡迎回來，<span id="welcomeName"></span>！
  </div>

  <!-- 初次設定彈窗 -->
  <div id="setupModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md mx-4">
      <div class="text-center mb-6">
        <div class="text-6xl mb-4">👋</div>
        <h3 class="text-3xl font-bold">歡迎加入小雞手抄！</h3>
        <p class="text-gray-600">請先設定你的資料</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-lg mb-2">暱稱 *</label>
          <input type="text" id="setupName" placeholder="你想要粉絲怎麼叫你？" class="w-full px-4 py-3 border rounded-xl text-lg">
        </div>
        <div>
          <label class="block text-lg mb-2">IG 帳號 *</label>
          <input type="text" id="setupIG" placeholder="你的 IG 帳號" class="w-full px-4 py-3 border rounded-xl text-lg">
        </div>
      </div>
      <button onclick="completeSetup()" class="w-full mt-6 bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl text-xl">完成設定</button>
    </div>
  </div>

  <!-- 首頁 -->
  <div id="pageHome">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- 左側：聊天 -->
      <div class="lg:col-span-2 space-y-6">
        
        <!-- 登入提示 -->
        <div id="loginBox" class="bg-white rounded-2xl shadow-lg p-8 text-center">
          <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-yellow-400 to-orange-400 rounded-full flex items-center justify-center text-6xl">💬</div>
          <h2 class="text-3xl font-bold mb-2">歡迎來到小雞手抄</h2>
          <p class="text-gray-600 mb-4">登入後即可參與聊天互動</p>
          <button onclick="signIn()" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 px-8 rounded-xl text-xl">使用 Google 登入</button>
        </div>

        <!-- 每日簽到 -->
        <div id="checkinBox" class="hide bg-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-xl font-bold">📅 每日簽到</h3>
              <p class="text-gray-600">連續簽到 <span id="streakDays">0</span> 天</p>
            </div>
            <button onclick="doCheckin()" id="checkinBtn" class="bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold py-3 px-6 rounded-xl text-lg">
              簽到 +5分
            </button>
          </div>
        </div>

        <!-- 聊天區 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <div class="flex items-center justify-between">
              <h2 class="text-white font-bold text-2xl">💬 即時聊天</h2>
              <span id="onlineCount" class="bg-white/20 text-white px-3 py-1 rounded-full text-sm">0人在線</span>
            </div>
          </div>
          <div id="chatBox" class="h-96 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
          <form onsubmit="sendMsg(event)" class="p-4 border-t bg-white">
            <div class="flex gap-2">
              <input type="text" id="msgInput" placeholder="輸入訊息..." class="flex-1 px-4 py-2 border rounded-xl text-lg" disabled>
              <button type="submit" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-6 py-2 rounded-xl text-lg">傳送</button>
            </div>
          </form>
        </div>

        <!-- 投稿區 -->
        <div id="postBox" class="hide bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-yellow-50 border-b border-yellow-200 p-4">
            <p class="text-yellow-700 text-lg">⚠️ 投稿前請先同意協作者邀請</p>
          </div>
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-2xl">📝 粉絲投稿</h2>
          </div>
          <form onsubmit="submitPost(event)" class="p-6 space-y-4">
            <div>
              <label class="block text-lg mb-2">IG 帳號 *</label>
              <input type="text" id="postIG" class="w-full px-4 py-2 border rounded-xl text-lg" required>
            </div>
            <div>
              <label class="block text-lg mb-2">投稿內容 *</label>
              <textarea id="postContent" rows="4" class="w-full px-4 py-2 border rounded-xl text-lg" placeholder="至少 10 個字" required></textarea>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl text-xl">送出投稿</button>
          </form>
        </div>
      </div>

      <!-- 右側：排行榜 + 用戶 -->
      <div class="space-y-6">
        
        <!-- 用戶資訊 -->
        <div id="userBox" class="hide bg-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center gap-4 mb-4">
            <div class="relative">
              <img id="userImg" src="" class="w-16 h-16 rounded-full border-4 border-yellow-400">
              <button onclick="showAvatarUpload()" class="absolute -bottom-1 -right-1 bg-yellow-400 text-white w-6 h-6 rounded-full text-xs">✎</button>
            </div>
            <div>
              <h3 id="userName" class="text-xl font-bold"></h3>
              <span id="userTitle" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-3 py-1 rounded-full text-sm"></span>
            </div>
          </div>
          <div class="space-y-2 text-lg">
            <p>📊 積分：<strong id="userPoints">0</strong></p>
            <p>🔥 連續：<strong id="userStreak">0</strong> 天</p>
            <p>💬 發言：<strong id="userMsgs">0</strong> 次</p>
          </div>
          <div class="mt-4 flex gap-2">
            <button onclick="showProfile()" class="flex-1 bg-gray-100 px-4 py-2 rounded-lg">編輯資料</button>
            <button onclick="showMyMessages()" class="flex-1 bg-gray-100 px-4 py-2 rounded-lg">我的訊息</button>
          </div>
        </div>

        <!-- 排行榜 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-2xl">🏆 粉絲排行榜</h2>
          </div>
          <div id="rankBox" class="p-4 space-y-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 排行頁面 -->
  <div id="pageRank" class="hide">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
        <h2 class="text-white font-bold text-2xl">🏆 完整排行榜</h2>
      </div>
      <div id="fullRankBox" class="p-4 space-y-3"></div>
    </div>
  </div>

  <!-- 管理頁面 -->
  <div id="pageAdmin" class="hide">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <div class="bg-gray-800 p-4">
        <h2 class="text-white font-bold text-2xl">⚙️ 管理員系統</h2>
      </div>
      
      <div class="flex border-b flex-wrap">
        <button onclick="adminTab('announce')" id="tabAnnounce" class="px-6 py-3 text-yellow-500 border-b-2 border-yellow-500 text-lg">公告管理</button>
        <button onclick="adminTab('msgs')" id="tabMsgs" class="px-6 py-3 text-gray-500 text-lg">訊息管理</button>
        <button onclick="adminTab('users')" id="tabUsers" class="px-6 py-3 text-gray-500 text-lg">用戶管理</button>
        <button onclick="adminTab('posts')" id="tabPosts" class="px-6 py-3 text-gray-500 text-lg">投稿審核</button>
      </div>

      <div id="adminAnnounce" class="p-4 space-y-4"></div>
      <div id="adminMsgs" class="hide p-4 space-y-3"></div>
      <div id="adminUsers" class="hide p-4 space-y-3"></div>
      <div id="adminPosts" class="hide p-4 space-y-3"></div>
    </div>
  </div>
</main>

<!-- 編輯資料彈窗 -->
<div id="profileModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
    <h3 class="text-xl font-bold mb-4">編輯個人資料</h3>
    <div class="space-y-4">
      <div>
        <label class="block mb-2 text-lg">暱稱</label>
        <input type="text" id="editName" class="w-full px-4 py-2 border rounded-xl text-lg">
      </div>
      <div>
        <label class="block mb-2 text-lg">IG 帳號</label>
        <input type="text" id="editIG" class="w-full px-4 py-2 border rounded-xl text-lg">
      </div>
    </div>
    <div class="flex gap-2 mt-6">
      <button onclick="saveProfile()" class="flex-1 bg-gradient-to-r from-yellow-400 to-orange-400 text-white py-2 rounded-xl text-lg">儲存</button>
      <button onclick="closeProfile()" class="flex-1 bg-gray-200 py-2 rounded-xl text-lg">取消</button>
    </div>
  </div>
</div>

<!-- 我的訊息彈窗 -->
<div id="myMsgsModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto">
    <h3 class="text-xl font-bold mb-4">我的訊息</h3>
    <div id="myMsgsBox" class="space-y-3"></div>
    <button onclick="closeMyMsgs()" class="w-full mt-4 bg-gray-200 py-2 rounded-xl text-lg">關閉</button>
  </div>
</div>

<!-- 頭像上傳 -->
<div id="avatarModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
    <h3 class="text-xl font-bold mb-4">選擇頭像</h3>
    <div class="grid grid-cols-5 gap-3 mb-4">
      <button onclick="setAvatar('')" class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐤</button>
      <button onclick="setAvatar('🐰')" class="w-16 h-16 rounded-full bg-pink-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐰</button>
      <button onclick="setAvatar('🐱')" class="w-16 h-16 rounded-full bg-orange-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐱</button>
      <button onclick="setAvatar('🐶')" class="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐶</button>
      <button onclick="setAvatar('🦊')" class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🦊</button>
      <button onclick="setAvatar('🐼')" class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐼</button>
      <button onclick="setAvatar('🐨')" class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐨</button>
      <button onclick="setAvatar('🦄')" class="w-16 h-16 rounded-full bg-purple-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🦄</button>
      <button onclick="setAvatar('🐸')" class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🐸</button>
      <button onclick="setAvatar('🦋')" class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-2xl hover:ring-4 ring-yellow-400">🦋</button>
    </div>
    <button onclick="closeAvatar()" class="w-full bg-gray-200 py-2 rounded-xl">關閉</button>
  </div>
</div>

<script>
// Firebase 設定
firebase.initializeApp({
  apiKey: "AIzaSyC9ARCgaoXfLFRVQb3djEhxN7ephFTlZ-U",
  authDomain: "chicken-33a60.firebaseapp.com",
  projectId: "chicken-33a60",
  storageBucket: "chicken-33a60.firebasestorage.app",
  messagingSenderId: "646431742714",
  appId: "1:646431742714:web:47d9a7f456843a6b9bc743"
});

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = 'jacob.frog.jacob@gmail.com';

let me = null;
let meData = null;
let unsubMsg = null;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hide');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

// 登入
async function signIn() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch (e) {
    toast('登入失敗');
  }
}

// 登出
async function logout() {
  await auth.signOut();
}

// 認證監聽
auth.onAuthStateChanged(async (user) => {
  me = user;
  
  if (user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    
    const isBuiltInAdmin = user.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    
    if (snap.exists) {
      meData = snap.data();
      if (isBuiltInAdmin && !meData.isAdmin) {
        await ref.update({ isAdmin: true });
        meData.isAdmin = true;
      }
    } else {
      meData = {
        displayName: user.displayName || '粉絲',
        email: user.email,
        photoURL: user.photoURL,
        emoji: '🐤',
        title: '新進粉絲',
        igAccount: '',
        points: 0,
        msgCount: 0,
        streak: 0,
        lastCheckin: null,
        isTopFan: false,
        isAdmin: isBuiltInAdmin,
        banned: false
      };
      await ref.set(meData);
    }
    
    if (meData.banned) {
      toast('您的帳號已被停權');
      await logout();
      return;
    }
    
    // 顯示
    document.getElementById('loginBox').classList.add('hide');
    document.getElementById('userBox').classList.remove('hide');
    document.getElementById('checkinBox').classList.remove('hide');
    document.getElementById('postBox').classList.remove('hide');
    document.getElementById('welcomeBox').classList.remove('hide');
    document.getElementById('welcomeName').textContent = meData.displayName;
    
    const avatarUrl = meData.emoji ? 
      `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23FFB800'/><text x='50' y='65' font-size='50' text-anchor='middle'>${meData.emoji}</text></svg>` :
      (meData.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>');
    
    document.getElementById('userImg').src = avatarUrl;
    document.getElementById('userName').textContent = meData.displayName;
    document.getElementById('userTitle').textContent = meData.title;
    document.getElementById('userPoints').textContent = meData.points || 0;
    document.getElementById('userStreak').textContent = meData.streak || 0;
    document.getElementById('userMsgs').textContent = meData.msgCount || 0;
    document.getElementById('streakDays').textContent = meData.streak || 0;
    document.getElementById('postIG').value = meData.igAccount || '';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnLogin').classList.add('hide');
    document.getElementById('btnLogout').classList.remove('hide');
    
    // 簽到檢查
    checkCheckinStatus();
    
    if (meData.isAdmin) {
      document.getElementById('btnAdmin').classList.remove('hide');
    }
    
    if (!meData.igAccount) {
      document.getElementById('setupModal').classList.remove('hide');
      document.getElementById('setupName').value = meData.displayName;
    }
    
    loadAnnouncement();
    toast('登入成功！');
  } else {
    meData = null;
    document.getElementById('loginBox').classList.remove('hide');
    document.getElementById('userBox').classList.add('hide');
    document.getElementById('checkinBox').classList.add('hide');
    document.getElementById('postBox').classList.add('hide');
    document.getElementById('welcomeBox').classList.add('hide');
    document.getElementById('setupModal').classList.add('hide');
    document.getElementById('btnLogin').classList.remove('hide');
    document.getElementById('btnLogout').classList.add('hide');
    document.getElementById('btnAdmin').classList.add('hide');
    document.getElementById('msgInput').disabled = true;
    document.getElementById('announceBanner').classList.add('hide');
    if (unsubMsg) unsubMsg();
  }
  
  loadChat();
  loadRank();
});

// 簽到狀態
function checkCheckinStatus() {
  const today = new Date().toDateString();
  if (meData.lastCheckin?.toDate().toDateString() === today) {
    document.getElementById('checkinBtn').disabled = true;
    document.getElementById('checkinBtn').textContent = '今日已簽到 ✓';
    document.getElementById('checkinBtn').classList.remove('from-green-400', 'to-emerald-500');
    document.getElementById('checkinBtn').classList.add('bg-gray-400');
  }
}

// 簽到
async function doCheckin() {
  const now = new Date();
  const last = meData.lastCheckin?.toDate();
  let newStreak = meData.streak || 0;
  
  if (last) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (last.toDateString() === yesterday.toDateString()) {
      newStreak++;
    } else if (last.toDateString() !== now.toDateString()) {
      newStreak = 1;
    }
  } else {
    newStreak = 1;
  }
  
  await db.collection('users').doc(me.uid).update({
    points: firebase.firestore.FieldValue.increment(5),
    streak: newStreak,
    lastCheckin: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  meData.points = (meData.points || 0) + 5;
  meData.streak = newStreak;
  meData.lastCheckin = now;
  
  document.getElementById('userPoints').textContent = meData.points;
  document.getElementById('userStreak').textContent = newStreak;
  document.getElementById('streakDays').textContent = newStreak;
  document.getElementById('checkinBtn').disabled = true;
  document.getElementById('checkinBtn').textContent = '今日已簽到 ✓';
  document.getElementById('checkinBtn').classList.remove('from-green-400', 'to-emerald-500');
  document.getElementById('checkinBtn').classList.add('bg-gray-400');
  
  toast(`簽到成功！+5分！連續${newStreak}天🔥`);
}

// 完成設定
async function completeSetup() {
  const name = document.getElementById('setupName').value.trim();
  const ig = document.getElementById('setupIG').value.trim();
  
  if (!name || name.length < 2) { toast('暱稱需至少2字'); return; }
  if (!ig) { toast('請填IG帳號'); return; }
  
  await db.collection('users').doc(me.uid).update({ displayName: name, igAccount: ig });
  meData.displayName = name;
  meData.igAccount = ig;
  
  document.getElementById('userName').textContent = name;
  document.getElementById('welcomeName').textContent = name;
  document.getElementById('postIG').value = ig;
  document.getElementById('setupModal').classList.add('hide');
  
  toast('設定完成！');
}

// 發送訊息
async function sendMsg(e) {
  e.preventDefault();
  if (!me || !meData || meData.banned) return;
  
  const content = document.getElementById('msgInput').value.trim();
  if (!content) return;
  
  await db.collection('messages').add({
    userId: me.uid,
    userName: meData.displayName,
    userAvatar: meData.emoji || '🐤',
    content,
    likes: 0,
    likedBy: [],
    isPinned: false,
    reply: null,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  await db.collection('users').doc(me.uid).update({
    points: firebase.firestore.FieldValue.increment(1),
    msgCount: firebase.firestore.FieldValue.increment(1)
  });
  
  meData.points = (meData.points || 0) + 1;
  meData.msgCount = (meData.msgCount || 0) + 1;
  document.getElementById('userPoints').textContent = meData.points;
  document.getElementById('userMsgs').textContent = meData.msgCount;
  
  document.getElementById('msgInput').value = '';
}

// 載入聊天
function loadChat() {
  if (unsubMsg) unsubMsg();
  
  unsubMsg = db.collection('messages')
    .orderBy('time', 'asc')
    .onSnapshot(snap => {
      const box = document.getElementById('chatBox');
      box.innerHTML = '';
      
      snap.forEach(doc => {
        const m = doc.data();
        const isMe = m.userId === me?.uid;
        const time = m.time?.toDate()?.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) || '';
        const liked = m.likedBy?.includes(me?.uid);
        
        let html = `
          <div class="p-3 rounded-xl ${m.isPinned ? 'bg-yellow-100 border-2 border-yellow-400' : isMe ? 'bg-yellow-50' : 'bg-white'}">
            <div class="flex justify-between items-start">
              <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center text-xl">${m.userAvatar || '🐤'}</div>
                <div>
                  <div class="flex items-center gap-2">
                    <span class="font-bold text-lg">${m.userName}</span>
                    ${m.isPinned ? '<span class="text-yellow-500 text-sm">📌</span>' : ''}
                    <span class="text-xs text-gray-400">${time}</span>
                  </div>
                  <p class="text-lg">${m.content}</p>
                  ${m.reply ? `<div class="mt-2 p-2 bg-blue-50 rounded text-sm border-l-4 border-blue-400">💬 回覆：${m.reply}</div>` : ''}
                  <div class="flex items-center gap-4 mt-2">
                    <button onclick="likeMsg('${doc.id}', ${m.likes}, ${JSON.stringify(m.likedBy || [])})" class="flex items-center gap-1 text-sm ${liked ? 'text-red-500' : 'text-gray-400 hover:text-red-500'}">
                      ❤️ ${m.likes || 0}
                    </button>
                    ${isMe ? `<button onclick="editMsg('${doc.id}', '${m.content}')" class="text-gray-400 text-sm hover:text-blue-500">編輯</button>` : ''}
                    ${isMe || meData?.isAdmin ? `<button onclick="delMsg('${doc.id}')" class="text-gray-400 text-sm hover:text-red-500">刪除</button>` : ''}
                  </div>
                </div>
              </div>
              ${meData?.isAdmin ? `
                <div class="flex gap-1">
                  <button onclick="replyMsg('${doc.id}')" class="text-blue-500 text-sm px-2 py-1 hover:bg-blue-50 rounded">回覆</button>
                  <button onclick="pinMsg('${doc.id}', ${m.isPinned})" class="text-sm px-2 py-1 hover:bg-yellow-50 rounded ${m.isPinned ? 'text-yellow-500' : 'text-gray-400'}">${m.isPinned ? '📌' : '置頂'}</button>
                </div>
              ` : ''}
            </div>
          </div>
        `;
        
        box.insertAdjacentHTML('beforeend', html);
      });
      
      box.scrollTop = box.scrollHeight;
      document.getElementById('onlineCount').textContent = snap.size + '條訊息';
    });
}

// 按讚
async function likeMsg(id, likes, likedBy) {
  if (!me || meData.banned) return;
  if (likedBy.includes(me.uid)) { toast('已點過讚'); return; }
  
  await db.collection('messages').doc(id).update({
    likes: (likes || 0) + 1,
    likedBy: [...likedBy, me.uid]
  });
}

// 編輯訊息
function editMsg(id, content) {
  const newContent = prompt('編輯訊息：', content);
  if (!newContent || newContent === content) return;
  db.collection('messages').doc(id).update({ content: newContent });
  toast('已更新');
}

// 回覆
async function replyMsg(id) {
  const reply = prompt('輸入回覆：');
  if (!reply) return;
  await db.collection('messages').doc(id).update({ reply });
  toast('已回覆');
}

// 置頂
async function pinMsg(id, isPinned) {
  await db.collection('messages').doc(id).update({ isPinned: !isPinned });
}

// 刪除
async function delMsg(id) {
  if (!confirm('確定刪除？')) return;
  await db.collection('messages').doc(id).delete();
}

// 載入排行榜
function loadRank() {
  db.collection('users')
    .orderBy('points', 'desc')
    .limit(10)
    .onSnapshot(snap => {
      const box = document.getElementById('rankBox');
      const fullBox = document.getElementById('fullRankBox');
      box.innerHTML = '';
      if (fullBox) fullBox.innerHTML = '';
      let rank = 1;
      
      snap.forEach(doc => {
        const u = doc.data();
        if (u.points <= 0 && !u.isTopFan) return;
        
        const icon = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '🏆';
        const title = rank === 1 ? '冠軍' : rank === 2 ? '亞軍' : rank === 3 ? '季軍' : '';
        const bg = rank === 1 ? 'from-yellow-400 to-orange-400 text-white' : 'bg-gray-100';
        
        const item = `
          <div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-r ${bg}">
            <span class="text-2xl">${icon}</span>
            <div class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center text-xl">${u.emoji || '🐤'}</div>
            <div class="flex-1">
              <span class="font-bold text-lg">${u.displayName}</span>
              ${u.igAccount ? `<br><span class="text-sm opacity-80">@${u.igAccount}</span>` : ''}
              ${title ? `<br><span class="text-sm opacity-80">${title}粉絲</span>` : ''}
              ${u.isTopFan ? `<br><span class="text-sm text-red-500">⭐ 置頂粉絲</span>` : ''}
            </div>
            <div class="text-right">
              <span class="font-bold text-lg">${u.points}</span>分
            </div>
          </div>
        `;
        
        box.insertAdjacentHTML('beforeend', item);
        if (fullBox) fullBox.insertAdjacentHTML('beforeend', item);
        rank++;
      });
      
      if (box.innerHTML === '') {
        box.innerHTML = '<p class="text-center text-gray-500 py-8 text-lg">還沒有人上榜，快去聊天吧！</p>';
      }
    });
}

// 公告
async function loadAnnouncement() {
  const snap = await db.collection('settings').doc('announcement').get();
  if (snap.exists && snap.data().text) {
    document.getElementById('announceText').textContent = snap.data().text;
    document.getElementById('announceBanner').classList.remove('hide');
  }
}

function closeAnnounce() {
  document.getElementById('announceBanner').classList.add('hide');
}

// 頁面切換
function showPage(page) {
  document.getElementById('pageHome').classList.add('hide');
  document.getElementById('pageRank').classList.add('hide');
  document.getElementById('pageAdmin').classList.add('hide');
  
  const pageEl = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
  if (pageEl) pageEl.classList.remove('hide');
  
  if (page === 'admin') loadAdmin();
  if (page === 'rank') loadRank();
}

// 管理員
function adminTab(tab) {
  ['Announce', 'Msgs', 'Users', 'Posts'].forEach(t => {
    document.getElementById('admin' + t)?.classList.add('hide');
    document.getElementById('tab' + t)?.classList.remove('text-yellow-500', 'border-yellow-500', 'border-b-2');
    document.getElementById('tab' + t)?.classList.add('text-gray-500');
  });
  document.getElementById('admin' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.remove('hide');
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.remove('text-gray-500');
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1))?.classList.add('text-yellow-500', 'border-b-2', 'border-yellow-500');
}

function loadAdmin() {
  // 公告
  db.collection('settings').doc('announcement').get().then(snap => {
    const box = document.getElementById('adminAnnounce');
    box.innerHTML = `
      <h3 class="font-bold text-lg">📢 發布公告</h3>
      <textarea id="announceInput" rows="3" class="w-full px-4 py-2 border rounded-xl text-lg" placeholder="輸入公告內容...">${snap.exists ? snap.data().text : ''}</textarea>
      <button onclick="saveAnnounce()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl text-lg">發布公告</button>
    `;
  });
  
  // 訊息
  db.collection('messages').orderBy('time', 'desc').get().then(snap => {
    const box = document.getElementById('adminMsgs');
    box.innerHTML = '';
    snap.forEach(doc => {
      const m = doc.data();
      box.innerHTML += `
        <div class="p-4 bg-gray-50 rounded-xl">
          <div class="flex justify-between items-start mb-2">
            <div>
              <span class="font-bold text-lg">${m.userName}</span>
              ${m.isPinned ? '<span class="ml-2 text-yellow-500 text-sm">📌</span>' : ''}
            </div>
            <div class="flex gap-2">
              <button onclick="pinMsg('${doc.id}', ${m.isPinned})" class="${m.isPinned ? 'bg-yellow-100' : 'bg-gray-200'} px-3 py-1 rounded text-sm">${m.isPinned ? '取消置頂' : '置頂'}</button>
              <button onclick="delMsg('${doc.id}')" class="bg-red-100 text-red-600 px-3 py-1 rounded text-sm">刪除</button>
            </div>
          </div>
          <p class="text-lg">${m.content}</p>
          ${m.reply ? `<div class="mt-2 p-2 bg-blue-50 rounded text-sm">💬 回覆：${m.reply}</div>` : ''}
          <div class="mt-2 flex gap-2">
            <input type="text" id="r-${doc.id}" placeholder="回覆..." class="flex-1 px-3 py-1 border rounded text-sm">
            <button onclick="sendReplyAdmin('${doc.id}')" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">送出</button>
          </div>
        </div>
      `;
    });
    if (snap.empty) box.innerHTML = '<p class="text-center text-gray-500 py-4">暫無訊息</p>';
  });
  
  // 用戶
  db.collection('users').get().then(snap => {
    const box = document.getElementById('adminUsers');
    box.innerHTML = '';
    snap.forEach(doc => {
      const u = doc.data();
      box.innerHTML += `
        <div class="p-4 bg-gray-50 rounded-xl">
          <div class="flex items-center gap-4 mb-3">
            <div class="w-12 h-12 rounded-full bg-yellow-400 flex items-center justify-center text-2xl">${u.emoji || '🐤'}</div>
            <div class="flex-1">
              <span class="font-bold text-xl">${u.displayName}</span>
              ${u.isAdmin ? '<span class="ml-2 text-sm bg-purple-100 text-purple-600 px-2 py-0.5 rounded">管理員</span>' : ''}
              ${u.isTopFan ? '<span class="ml-2 text-sm bg-red-100 text-red-600 px-2 py-0.5 rounded">置頂</span>' : ''}
              ${u.banned ? '<span class="ml-2 text-sm bg-gray-300 text-gray-600 px-2 py-0.5 rounded">已停權</span>' : ''}
              <br>
              <span class="text-gray-500 text-sm">@${u.igAccount || '未設定'} | ${u.email}</span>
            </div>
          </div>
          <div class="flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-2">
              <label class="text-sm">積分：</label>
              <input type="number" id="pts-${doc.id}" value="${u.points || 0}" class="w-20 px-2 py-1 border rounded text-center">
              <button onclick="setPoints('${doc.id}')" class="bg-green-500 text-white px-3 py-1 rounded text-sm">更新</button>
            </div>
            <button onclick="toggleTopFan('${doc.id}', ${u.isTopFan})" class="${u.isTopFan ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'} px-3 py-1 rounded text-sm">
              ${u.isTopFan ? '取消置頂' : '設為置頂'}
            </button>
            <button onclick="toggleBan('${doc.id}', ${u.banned})" class="${u.banned ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} px-3 py-1 rounded text-sm">
              ${u.banned ? '解除停權' : '停權'}
            </button>
          </div>
        </div>
      `;
    });
  });
  
  // 投稿
  db.collection('submissions').orderBy('time', 'desc').get().then(snap => {
    const box = document.getElementById('adminPosts');
    const pending = snap.docs.filter(d => d.data().status === 'pending');
    box.innerHTML = '';
    
    if (pending.length === 0) {
      box.innerHTML = '<p class="text-center text-gray-500 py-4">暫無待審核投稿</p>';
      return;
    }
    
    pending.forEach(doc => {
      const p = doc.data();
      box.innerHTML += `
        <div class="p-4 bg-gray-50 rounded-xl">
          <div class="flex justify-between mb-2">
            <div>
              <span class="font-bold text-xl">${p.userName}</span>
              <br>
              <span class="text-gray-500">@${p.igAccount}</span>
            </div>
          </div>
          <p class="text-lg mb-3">${p.content}</p>
          <div class="flex gap-2">
            <button onclick="apprPost('${doc.id}')" class="flex-1 bg-green-500 text-white py-2 rounded text-lg">✅ 核准</button>
            <button onclick="rejectPost('${doc.id}')" class="flex-1 bg-red-500 text-white py-2 rounded text-lg">❌ 拒絕</button>
          </div>
        </div>
      `;
    });
  });
}

async function saveAnnounce() {
  const text = document.getElementById('announceInput').value.trim();
  await db.collection('settings').doc('announcement').set({ text });
  document.getElementById('announceText').textContent = text;
  document.getElementById('announceBanner').classList.remove('hide');
  toast('公告已發布');
}

function sendReplyAdmin(id) {
  const reply = document.getElementById('r-' + id).value.trim();
  if (!reply) return;
  db.collection('messages').doc(id).update({ reply });
  toast('已回覆');
  loadAdmin();
}

async function setPoints(id) {
  const pts = document.getElementById('pts-' + id).value;
  await db.collection('users').doc(id).update({ points: parseInt(pts) || 0 });
  toast('積分已更新');
}

async function toggleTopFan(id, isTopFan) {
  await db.collection('users').doc(id).update({ isTopFan: !isTopFan });
  loadAdmin();
}

async function toggleBan(id, banned) {
  await db.collection('users').doc(id).update({ banned: !banned });
  toast(banned ? '已解除停權' : '已停權');
  loadAdmin();
}

async function apprPost(id) {
  await db.collection('submissions').doc(id).update({ status: 'approved' });
  toast('已核准');
  loadAdmin();
}

async function rejectPost(id) {
  await db.collection('submissions').doc(id).update({ status: 'rejected' });
  toast('已拒絕');
  loadAdmin();
}

// 投稿
async function submitPost(e) {
  e.preventDefault();
  if (!me || !meData) return;
  
  const ig = document.getElementById('postIG').value.trim();
  const content = document.getElementById('postContent').value.trim();
  
  if (!ig) { toast('請填IG帳號'); return; }
  if (content.length < 10) { toast('內容需至少10字'); return; }
  
  await db.collection('submissions').add({
    userId: me.uid,
    userName: meData.displayName,
    igAccount: ig,
    content,
    status: 'pending',
    time: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  document.getElementById('postContent').value = '';
  toast('投稿成功！');
}

// 個人資料
function showProfile() {
  document.getElementById('editName').value = meData.displayName;
  document.getElementById('editIG').value = meData.igAccount || '';
  document.getElementById('profileModal').classList.remove('hide');
}

function closeProfile() {
  document.getElementById('profileModal').classList.add('hide');
}

async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const ig = document.getElementById('editIG').value.trim();
  
  if (!name || name.length < 2) { toast('暱稱需至少2字'); return; }
  
  await db.collection('users').doc(me.uid).update({ displayName: name, igAccount: ig });
  meData.displayName = name;
  meData.igAccount = ig;
  
  document.getElementById('userName').textContent = name;
  document.getElementById('welcomeName').textContent = name;
  closeProfile();
  toast('已更新');
}

// 我的訊息
function showMyMessages() {
  const box = document.getElementById('myMsgsBox');
  box.innerHTML = '<p class="text-gray-500">載入中...</p>';
  document.getElementById('myMsgsModal').classList.remove('hide');
  
  db.collection('messages').where('userId', '==', me.uid).orderBy('time', 'desc').get().then(snap => {
    box.innerHTML = '';
    if (snap.empty) {
      box.innerHTML = '<p class="text-gray-500 text-center py-4">還沒有發過訊息</p>';
      return;
    }
    snap.forEach(doc => {
      const m = doc.data();
      box.innerHTML += `
        <div class="p-3 bg-gray-50 rounded-xl">
          <p class="text-lg">${m.content}</p>
          <div class="flex gap-4 mt-2 text-sm text-gray-500">
            <span>❤️ ${m.likes || 0}</span>
            <span>${m.time?.toDate()?.toLocaleString('zh-TW') || ''}</span>
            <button onclick="editMsg('${doc.id}', '${m.content}')" class="text-blue-500">編輯</button>
            <button onclick="delMsg('${doc.id}')" class="text-red-500">刪除</button>
          </div>
        </div>
      `;
    });
  });
}

function closeMyMsgs() {
  document.getElementById('myMsgsModal').classList.add('hide');
}

// 頭像
function showAvatarUpload() {
  document.getElementById('avatarModal').classList.remove('hide');
}

function closeAvatar() {
  document.getElementById('avatarModal').classList.add('hide');
}

async function setAvatar(emoji) {
  await db.collection('users').doc(me.uid).update({ emoji });
  meData.emoji = emoji;
  document.getElementById('userImg').src = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23FFB800'/><text x='50' y='65' font-size='50' text-anchor='middle'>${emoji || '🐤'}</text></svg>`;
  closeAvatar();
  toast('頭像已更新');
}

// 初始
loadChat();
loadRank();
</script>
