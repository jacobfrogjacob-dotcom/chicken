
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐤 小雞手抄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Ma+Shan+Zheng&family=Long+Cang&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#FFB800', secondary: '#FF6B35' }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    
    /* 大標題改用龍藏體，更具張力 */
    .title-impact { 
      font-family: 'Long Cang', cursive !important; 
      font-size: 3.8rem !important; 
      line-height: 1;
      letter-spacing: -2px;
    }

    .font-cc { font-family: 'Ma Shan Zheng', cursive; }
    .hide { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
    
    @media (max-width: 640px) {
      .title-impact { font-size: 2.8rem !important; }
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">

<div id="toast" class="hide fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full z-50 shadow-xl transition-all duration-300"></div>

<header class="bg-gradient-to-r from-yellow-400 to-orange-400 shadow-lg sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between">
      <h1 class="font-bold text-white title-impact cursor-pointer flex items-center gap-2" onclick="showPage('home')">
        <span class="text-3xl">🐤</span> 小雞手抄
      </h1>
      <div class="flex gap-2 font-cc">
        <button onclick="showPage('home')" class="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl text-white transition-colors">首頁</button>
        <button onclick="showPage('admin')" id="btnAdmin" class="hide px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl text-white">管理</button>
        <button onclick="logout()" id="btnLogout" class="hide px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl text-white">登出</button>
        <button onclick="signIn()" id="btnLogin" class="px-4 py-2 bg-white text-orange-500 font-bold rounded-xl shadow-md hover:bg-orange-50 transition-all">登入</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

  <div id="welcomeBox" class="hide bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 rounded-3xl p-6 mb-8 text-white text-center shadow-lg transition-all animate-fade-in">
    <h2 class="text-2xl font-bold font-cc italic">🎉 歡迎回來，<span id="welcomeName"></span>！</h2>
  </div>

  <div id="setupModal" class="hide fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4 shadow-2xl">
      <div class="text-center mb-6">
        <div class="text-6xl mb-4">🐣</div>
        <h3 class="text-2xl font-bold font-cc">完善個人資料</h3>
        <p class="text-gray-500 font-cc text-sm">請先設置您的稱呼與 IG</p>
      </div>
      <div class="space-y-4 font-cc">
        <div>
          <label class="block text-gray-600 mb-1 ml-1 text-sm">您的暱稱</label>
          <input type="text" id="setupName" class="w-full px-4 py-3 border border-yellow-100 rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none">
        </div>
        <div>
          <label class="block text-gray-600 mb-1 ml-1 text-sm">您的 IG 帳號</label>
          <input type="text" id="setupIG" placeholder="Instagram ID" class="w-full px-4 py-3 border border-yellow-100 rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none">
        </div>
      </div>
      <button onclick="completeSetup()" class="w-full mt-8 bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-4 rounded-2xl font-cc text-xl shadow-lg active:scale-95 transition-all">開啟旅程</button>
    </div>
  </div>

  <div id="pageHome">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-8">
        
        <div id="loginBox" class="bg-white rounded-3xl shadow-xl p-10 text-center border-t-8 border-yellow-400">
          <div class="w-24 h-24 mx-auto mb-6 bg-yellow-100 rounded-full flex items-center justify-center text-5xl">💬</div>
          <h2 class="text-2xl font-bold font-cc mb-3 text-gray-800">加入即時互動</h2>
          <p class="text-gray-500 font-cc mb-8 text-sm">在這裡與大家交流心得，或投稿您的手抄作品</p>
          <button onclick="signIn()" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-4 px-12 rounded-2xl font-cc text-xl shadow-xl active:scale-95 transition-all">Google 快速登入</button>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-white">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-5">
            <h2 class="text-white font-bold text-xl font-cc">💬 即時聊天室</h2>
          </div>
          <div id="chatBox" class="h-[450px] overflow-y-auto p-6 space-y-4 bg-gray-50/30"></div>
          <form onsubmit="sendMsg(event)" class="p-4 border-t bg-white flex gap-3 font-cc">
            <input type="text" id="msgInput" placeholder="輸入訊息..." class="flex-1 px-5 py-3 border border-yellow-100 rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none transition-all" disabled>
            <button type="submit" class="bg-primary text-white font-bold px-8 rounded-2xl shadow-md">傳送</button>
          </form>
        </div>

        <div id="postBox" class="hide bg-white rounded-3xl shadow-xl overflow-hidden border border-white">
          <div class="bg-gradient-to-r from-orange-400 to-red-400 p-5">
            <h2 class="text-white font-bold text-xl font-cc">📝 粉絲創作投稿</h2>
          </div>
          <form onsubmit="submitPost(event)" class="p-8 space-y-6 font-cc">
            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-gray-500 text-xs mb-2">投稿暱稱</label>
                <input type="text" id="postName" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl font-bold" readonly>
              </div>
              <div>
                <label class="block text-gray-500 text-xs mb-2">IG 帳號</label>
                <input type="text" id="postIG" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl font-bold" readonly>
              </div>
            </div>
            <div>
              <label class="block text-gray-500 text-xs mb-2">投稿內容 (至少 10 字)</label>
              <textarea id="postContent" rows="5" class="w-full px-4 py-3 border border-yellow-100 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400 transition-all" placeholder="分享您的手抄作品..." required></textarea>
            </div>
            <button type="submit" class="w-full bg-secondary text-white font-bold py-5 rounded-2xl text-xl shadow-lg active:scale-[0.98] transition-all">確認提交</button>
          </form>
        </div>
      </div>

      <div class="space-y-8">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-white">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-5 text-center">
            <h2 class="text-white font-bold text-xl font-cc">🏆 貢獻排行榜</h2>
          </div>
          <div id="rankBox" class="p-5 space-y-4"></div>
        </div>

        <div id="userBox" class="hide bg-white rounded-3xl shadow-xl p-8 border-b-8 border-primary relative overflow-hidden text-center">
          <img id="userImg" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-yellow-300 shadow-lg mb-4">
          <h3 id="userName" class="text-2xl font-bold font-cc text-gray-800"></h3>
          <p id="userTitle" class="text-secondary font-bold font-cc mb-6 text-sm"></p>
          <div class="w-full bg-yellow-50 rounded-2xl py-5 shadow-inner">
            <p class="text-[10px] text-gray-400 font-cc uppercase tracking-widest mb-1">目前雞力能量</p>
            <p class="text-4xl font-bold text-primary" id="userPoints">0</p>
          </div>
          <button onclick="showProfile()" class="mt-6 text-gray-400 hover:text-primary transition-colors font-cc border-b border-gray-100 text-sm">編輯個人資料</button>
        </div>
      </div>
    </div>
  </div>

  <div id="pageAdmin" class="hide">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
      <div class="bg-gray-800 p-6 flex justify-between items-center text-white">
        <h2 class="font-bold text-xl font-cc">⚙️ 管理員後台</h2>
        <button onclick="showPage('home')" class="text-sm opacity-60 hover:opacity-100 font-cc">返回首頁</button>
      </div>
      <div class="flex border-b font-cc text-center bg-gray-50">
        <button onclick="adminTab('msgs')" id="tabMsgs" class="flex-1 py-4 text-yellow-500 border-b-4 border-yellow-500 font-bold">訊息管理</button>
        <button onclick="adminTab('users')" id="tabUsers" class="flex-1 py-4 text-gray-400 hover:text-gray-600">用戶數據</button>
        <button onclick="adminTab('posts')" id="tabPosts" class="flex-1 py-4 text-gray-400 hover:text-gray-600">投稿審核</button>
      </div>
      <div id="adminMsgs" class="p-6 divide-y divide-gray-100"></div>
      <div id="adminUsers" class="hide p-6 divide-y divide-gray-100"></div>
      <div id="adminPosts" class="hide p-6 space-y-4 font-cc"></div>
    </div>
  </div>
</main>

<div id="profileModal" class="hide fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 font-cc">
  <div class="bg-white rounded-3xl p-10 w-full max-w-sm mx-4 shadow-2xl">
    <h3 class="text-2xl font-bold mb-8 text-center text-gray-800 underline decoration-yellow-400 underline-offset-8">修改個人資料</h3>
    <div class="space-y-5">
      <div>
        <label class="block text-gray-400 text-sm mb-1 ml-1">顯示暱稱</label>
        <input type="text" id="editName" class="w-full px-5 py-3 border border-yellow-50 rounded-2xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-yellow-400 outline-none transition-all">
      </div>
      <div>
        <label class="block text-gray-400 text-sm mb-1 ml-1">IG 帳號</label>
        <input type="text" id="editIG" class="w-full px-5 py-3 border border-yellow-50 rounded-2xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-yellow-400 outline-none transition-all">
      </div>
    </div>
    <div class="flex gap-4 mt-10">
      <button onclick="saveProfile()" class="flex-1 bg-primary text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">保存</button>
      <button onclick="closeProfile()" class="flex-1 bg-gray-100 text-gray-400 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all">取消</button>
    </div>
  </div>
</div>

<script>
// Firebase 配置
firebase.initializeApp({
  apiKey: "AIzaSyC9ARCgaoXfLFRVQb3djEhxN7ephFTlZ-U",
  authDomain: "chicken-33a60.firebaseapp.com",
  projectId: "chicken-33a60",
  storageBucket: "chicken-33a60.firebasestorage.app",
  messagingSenderId: "646431742714",
  appId: "1:646431742714:web:47d9a7f456843a6b9bc743"
});

const auth = firebase.auth();
const db = firebase.firestore();
let me = null, meData = null, unsubMsg = null;

// 新增：數字簡化邏輯 (2000 -> 2k)
function simplifyNum(num) {
  if (num >= 1000) {
    return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  }
  return num;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hide');
  setTimeout(() => t.classList.add('hide'), 2500);
}

async function signIn() { try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch (e) { toast('登入失敗'); } }
async function logout() { await auth.signOut(); location.reload(); }

auth.onAuthStateChanged(async (user) => {
  me = user;
  if (user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    if (snap.exists) { 
      meData = snap.data(); 
    } else {
      meData = { displayName: user.displayName || '熱心粉絲', photoURL: user.photoURL, title: '初級小雞', igAccount: '', points: 0, isAdmin: false };
      await ref.set(meData);
    }
    
    document.getElementById('loginBox').classList.add('hide');
    document.getElementById('userBox').classList.remove('hide');
    document.getElementById('postBox').classList.remove('hide');
    document.getElementById('welcomeBox').classList.remove('hide');
    document.getElementById('welcomeName').textContent = meData.displayName;
    document.getElementById('userImg').src = meData.photoURL;
    document.getElementById('userName').textContent = meData.displayName;
    document.getElementById('userTitle').textContent = meData.title;
    document.getElementById('userPoints').textContent = simplifyNum(meData.points); // 簡化
    document.getElementById('postName').value = meData.displayName;
    document.getElementById('postIG').value = meData.igAccount || '';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnLogin').classList.add('hide');
    document.getElementById('btnLogout').classList.remove('hide');
    
    if (meData.isAdmin) document.getElementById('btnAdmin').classList.remove('hide');
    if (!meData.igAccount) document.getElementById('setupModal').classList.remove('hide');
  }
  loadChat(); loadRank();
});

async function completeSetup() {
  const n = document.getElementById('setupName').value.trim();
  const ig = document.getElementById('setupIG').value.trim();
  if (!n || !ig) { toast('請填寫完整資訊'); return; }
  await db.collection('users').doc(me.uid).update({ displayName: n, igAccount: ig });
  location.reload();
}

async function sendMsg(e) {
  e.preventDefault();
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if (!txt) return;
  await db.collection('messages').add({ userId: me.uid, userName: meData.displayName, userAvatar: meData.photoURL, content: txt, time: firebase.firestore.FieldValue.serverTimestamp() });
  await db.collection('users').doc(me.uid).update({ points: firebase.firestore.FieldValue.increment(1) });
  inp.value = '';
}

function loadChat() {
  if (unsubMsg) unsubMsg();
  unsubMsg = db.collection('messages').orderBy('time', 'asc').limitToLast(50).onSnapshot(snap => {
    const box = document.getElementById('chatBox'); box.innerHTML = '';
    snap.forEach(doc => {
      const m = doc.data();
      const isMe = m.userId === me?.uid;
      box.innerHTML += `
        <div class="flex gap-4 ${isMe ? 'flex-row-reverse' : ''}">
          <img src="${m.userAvatar}" class="w-10 h-10 rounded-full border-2 border-yellow-200">
          <div class="max-w-[80%] ${isMe ? 'bg-primary text-white shadow-md' : 'bg-white border border-yellow-50'} p-4 rounded-2xl">
            <p class="text-[10px] opacity-60 mb-1 font-bold">${m.userName}</p>
            <p class="leading-relaxed font-cc">${m.content}</p>
          </div>
        </div>`;
    });
    box.scrollTop = box.scrollHeight;
  });
}

function loadRank() {
  db.collection('users').orderBy('points', 'desc').limit(10).onSnapshot(snap => {
    const box = document.getElementById('rankBox'); box.innerHTML = '';
    let i = 1;
    snap.forEach(doc => {
      const u = doc.data(); if (u.points <= 0) return;
      const bg = i === 1 ? 'from-yellow-400 to-orange-400 text-white shadow-md' : 'bg-gray-50';
      box.innerHTML += `
        <div class="flex items-center gap-4 p-4 rounded-2xl bg-gradient-to-r ${bg} transition-transform hover:scale-[1.02]">
          <span class="text-xl font-bold w-6 font-mono">${i}</span>
          <img src="${u.photoURL}" class="w-10 h-10 rounded-full border border-white/50">
          <div class="flex-1 font-cc truncate"><b>${u.displayName}</b></div>
          <div class="font-bold font-mono">${simplifyNum(u.points)}</div> 
        </div>`;
      i++;
    });
  });
}

async function submitPost(e) {
  e.preventDefault();
  const c = document.getElementById('postContent').value.trim();
  if (c.length < 10) { toast('內容不足 10 字'); return; }
  await db.collection('submissions').add({ userId: me.uid, userName: meData.displayName, igAccount: meData.igAccount, content: c, status: 'pending', time: firebase.firestore.FieldValue.serverTimestamp() });
  document.getElementById('postContent').value = '';
  toast('投稿成功！');
}

function showPage(p) {
  document.getElementById('pageHome').classList.add('hide');
  document.getElementById('pageAdmin').classList.add('hide');
  document.getElementById('page' + p.charAt(0).toUpperCase() + p.slice(1)).classList.remove('hide');
  if (p === 'admin') loadAdmin();
}

function adminTab(t) {
  ['Msgs','Users','Posts'].forEach(x => {
    document.getElementById('admin'+x).classList.add('hide');
    document.getElementById('tab'+x).className = 'flex-1 py-4 text-gray-400 hover:text-gray-600';
  });
  document.getElementById('admin'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hide');
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).className = 'flex-1 py-4 text-yellow-500 border-b-4 border-yellow-500 font-bold';
}

async function loadAdmin() {
  // 載入管理員相關內容 (與原代碼邏輯一致)
  const mBox = document.getElementById('adminMsgs'); mBox.innerHTML = '載入中...';
  const mSnap = await db.collection('messages').orderBy('time','desc').limit(20).get();
  mBox.innerHTML = '';
  mSnap.forEach(doc => {
    const d = doc.data();
    mBox.innerHTML += `<div class="py-3 flex justify-between items-center font-cc">
      <div><b>${d.userName}:</b> ${d.content}</div>
      <button onclick="delDoc('messages','${doc.id}')" class="text-red-500 text-sm">刪除</button>
    </div>`;
  });
}

async function delDoc(col, id) { if(confirm('確定刪除?')) { await db.collection(col).doc(id).delete(); loadAdmin(); } }

function showProfile() { document.getElementById('editName').value = meData.displayName; document.getElementById('editIG').value = meData.igAccount || ''; document.getElementById('profileModal').classList.remove('hide'); }
function closeProfile() { document.getElementById('profileModal').classList.add('hide'); }
async function saveProfile() {
  const n = document.getElementById('editName').value.trim();
  const ig = document.getElementById('editIG').value.trim();
  if (n.length < 2) { toast('暱稱過短'); return; }
  await db.collection('users').doc(me.uid).update({ displayName: n, igAccount: ig });
  location.reload();
}
</script>
</body>
</html>
