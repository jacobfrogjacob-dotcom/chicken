<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐤 小雞手抄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#FFB800', secondary: '#FF6B35' }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    .font-cc { font-family: 'Ma Shan Zheng', cursive; }
    .hide { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 to-orange-50">

<div id="toast" class="hide fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl z-50"></div>

<!-- Header -->
<header class="bg-gradient-to-r from-yellow-400 to-orange-400 shadow-lg">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between">
      <h1 class="text-4xl font-bold text-white font-cc">
        <span class="text-5xl">🐤</span> 小雞手抄
      </h1>
      <div class="flex gap-2">
        <button onclick="showPage('home')" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white">首頁</button>
        <button onclick="showPage('admin')" id="btnAdmin" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white">管理</button>
        <button onclick="logout()" id="btnLogout" class="hide p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white">登出</button>
        <button onclick="signIn()" id="btnLogin" class="p-2 bg-white/20 hover:bg-white/30 rounded-xl text-white">登入</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">

  <!-- 歡迎橫幅 -->
  <div id="welcomeBox" class="hide bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 rounded-2xl p-6 mb-6 text-white text-center">
    <h2 class="text-2xl font-bold font-cc">🎉 歡迎回來，<span id="welcomeName"></span>！</h2>
  </div>

  <!-- 初次設定彈窗 -->
  <div id="setupModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md mx-4">
      <div class="text-center mb-6">
        <div class="text-6xl mb-4">👋</div>
        <h3 class="text-2xl font-bold font-cc">歡迎加入小雞手抄！</h3>
        <p class="text-gray-600 font-cc">請先設定你的資料</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-gray-700 font-cc mb-2">暱稱 *</label>
          <input type="text" id="setupName" placeholder="你想要粉絲怎麼叫你？" class="w-full px-4 py-3 border rounded-xl font-cc text-lg">
        </div>
        <div>
          <label class="block text-gray-700 font-cc mb-2">IG 帳號 *</label>
          <input type="text" id="setupIG" placeholder="你的 IG 帳號" class="w-full px-4 py-3 border rounded-xl font-cc text-lg">
        </div>
      </div>
      <button onclick="completeSetup()" class="w-full mt-6 bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl font-cc text-xl">完成設定</button>
    </div>
  </div>

  <!-- 首頁 -->
  <div id="pageHome">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- 左側：聊天 -->
      <div class="lg:col-span-2 space-y-6">
        
        <!-- 登入提示 -->
        <div id="loginBox" class="bg-white rounded-2xl shadow-lg p-8 text-center">
          <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-yellow-400 to-orange-400 rounded-full flex items-center justify-center text-5xl">💬</div>
          <h2 class="text-2xl font-bold font-cc mb-2">歡迎來到小雞手抄</h2>
          <p class="text-gray-600 font-cc mb-4">登入後即可參與聊天互動</p>
          <button onclick="signIn()" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 px-8 rounded-xl font-cc text-lg">使用 Google 登入</button>
        </div>

        <!-- 聊天區 -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-xl font-cc">💬 即時聊天</h2>
          </div>
          <div id="chatBox" class="h-80 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
          <form onsubmit="sendMsg(event)" class="p-4 border-t bg-white">
            <div class="flex gap-2">
              <input type="text" id="msgInput" placeholder="輸入訊息..." class="flex-1 px-4 py-2 border rounded-xl font-cc" disabled>
              <button type="submit" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-4 rounded-xl">傳送</button>
            </div>
          </form>
        </div>

        <!-- 投稿區 -->
        <div id="postBox" class="hide bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-yellow-50 border-b border-yellow-200 p-4">
            <p class="text-yellow-700 font-cc">⚠️ 投稿前請先同意協作者邀請</p>
          </div>
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-xl font-cc">📝 粉絲投稿</h2>
          </div>
          <form onsubmit="submitPost(event)" class="p-6 space-y-4">
            <div>
              <label class="block font-cc mb-2">IG 帳號 *</label>
              <input type="text" id="postIG" class="w-full px-4 py-2 border rounded-xl font-cc" required>
            </div>
            <div>
              <label class="block font-cc mb-2">投稿內容 *</label>
              <textarea id="postContent" rows="4" class="w-full px-4 py-2 border rounded-xl font-cc" placeholder="至少 10 個字" required></textarea>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold py-3 rounded-xl font-cc text-lg">送出投稿</button>
          </form>
        </div>
      </div>

      <!-- 右側：排行榜 -->
      <div class="space-y-6">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-4">
            <h2 class="text-white font-bold text-xl font-cc">🏆 粉絲排行榜</h2>
          </div>
          <div id="rankBox" class="p-4 space-y-3"></div>
        </div>

        <!-- 用戶資訊 -->
        <div id="userBox" class="hide bg-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center gap-4 mb-4">
            <img id="userImg" src="" class="w-16 h-16 rounded-full border-4 border-yellow-400">
            <div>
              <h3 id="userName" class="text-xl font-bold font-cc"></h3>
              <span id="userTitle" class="bg-gradient-to-r from-yellow-400 to-orange-400 text-white px-3 py-1 rounded-full text-sm font-cc"></span>
            </div>
          </div>
          <div class="text-center font-cc">
            <p>📊 <strong id="userPoints">0</strong> 積分</p>
            <button onclick="showProfile()" class="mt-3 bg-gray-100 px-4 py-2 rounded-lg font-cc">編輯資料</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 管理頁面 -->
  <div id="pageAdmin" class="hide">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <div class="bg-gray-800 p-4">
        <h2 class="text-white font-bold text-xl font-cc">⚙️ 管理員系統</h2>
      </div>
      
      <div class="flex border-b">
        <button onclick="adminTab('msgs')" id="tabMsgs" class="px-6 py-3 font-cc text-yellow-500 border-b-2 border-yellow-500">訊息</button>
        <button onclick="adminTab('users')" id="tabUsers" class="px-6 py-3 font-cc text-gray-500">用戶</button>
        <button onclick="adminTab('posts')" id="tabPosts" class="px-6 py-3 font-cc text-gray-500">投稿</button>
      </div>

      <div id="adminMsgs" class="p-4 space-y-3"></div>
      <div id="adminUsers" class="hide p-4 space-y-3"></div>
      <div id="adminPosts" class="hide p-4 space-y-3"></div>
    </div>
  </div>
</main>

<!-- 編輯資料彈窗 -->
<div id="profileModal" class="hide fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
    <h3 class="text-xl font-bold font-cc mb-4">編輯個人資料</h3>
    <div class="space-y-4">
      <div>
        <label class="block font-cc mb-2">暱稱</label>
        <input type="text" id="editName" class="w-full px-4 py-2 border rounded-xl font-cc">
      </div>
      <div>
        <label class="block font-cc mb-2">IG 帳號</label>
        <input type="text" id="editIG" class="w-full px-4 py-2 border rounded-xl font-cc">
      </div>
    </div>
    <div class="flex gap-2 mt-6">
      <button onclick="saveProfile()" class="flex-1 bg-gradient-to-r from-yellow-400 to-orange-400 text-white py-2 rounded-xl font-cc">儲存</button>
      <button onclick="closeProfile()" class="flex-1 bg-gray-200 py-2 rounded-xl font-cc">取消</button>
    </div>
  </div>
</div>

<script>
// Firebase 設定
firebase.initializeApp({
  apiKey: "AIzaSyC9ARCgaoXfLFRVQb3djEhxN7ephFTlZ-U",
  authDomain: "chicken-33a60.firebaseapp.com",
  projectId: "chicken-33a60",
  storageBucket: "chicken-33a60.firebasestorage.app",
  messagingSenderId: "646431742714",
  appId: "1:646431742714:web:47d9a7f456843a6b9bc743"
});

const auth = firebase.auth();
const db = firebase.firestore();

let me = null;
let meData = null;
let unsubMsg = null;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hide');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2000);
}

// 登入
async function signIn() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch (e) {
    toast('登入失敗');
  }
}

// 登出
async function logout() {
  await auth.signOut();
}

// 認證監聽
auth.onAuthStateChanged(async (user) => {
  me = user;
  
  if (user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    
    if (snap.exists) {
      meData = snap.data();
    } else {
      meData = {
        displayName: user.displayName || '粉絲',
        email: user.email,
        photoURL: user.photoURL,
        title: '新進粉絲',
        igAccount: '',
        points: 0,
        isAdmin: false
      };
      await ref.set(meData);
    }
    
    // 顯示用戶資訊
    document.getElementById('loginBox').classList.add('hide');
    document.getElementById('userBox').classList.remove('hide');
    document.getElementById('postBox').classList.remove('hide');
    document.getElementById('welcomeBox').classList.remove('hide');
    document.getElementById('welcomeName').textContent = meData.displayName;
    document.getElementById('userImg').src = meData.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>';
    document.getElementById('userName').textContent = meData.displayName;
    document.getElementById('userTitle').textContent = meData.title;
    document.getElementById('userPoints').textContent = meData.points || 0;
    document.getElementById('postIG').value = meData.igAccount || '';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnLogin').classList.add('hide');
    document.getElementById('btnLogout').classList.remove('hide');
    
    if (meData.isAdmin) {
      document.getElementById('btnAdmin').classList.remove('hide');
    }
    
    // 檢查是否需要設定
    if (!meData.igAccount) {
      document.getElementById('setupModal').classList.remove('hide');
      document.getElementById('setupName').value = meData.displayName;
    }
    
    toast('登入成功！');
  } else {
    meData = null;
    document.getElementById('loginBox').classList.remove('hide');
    document.getElementById('userBox').classList.add('hide');
    document.getElementById('postBox').classList.add('hide');
    document.getElementById('welcomeBox').classList.add('hide');
    document.getElementById('setupModal').classList.add('hide');
    document.getElementById('btnLogin').classList.remove('hide');
    document.getElementById('btnLogout').classList.add('hide');
    document.getElementById('btnAdmin').classList.add('hide');
    document.getElementById('msgInput').disabled = true;
    
    if (unsubMsg) unsubMsg();
  }
  
  loadChat();
  loadRank();
});

// 完成設定
async function completeSetup() {
  const name = document.getElementById('setupName').value.trim();
  const ig = document.getElementById('setupIG').value.trim();
  
  if (!name || name.length < 2) { toast('暱稱需至少2字'); return; }
  if (!ig) { toast('請填IG帳號'); return; }
  
  await db.collection('users').doc(me.uid).update({ displayName: name, igAccount: ig });
  meData.displayName = name;
  meData.igAccount = ig;
  
  document.getElementById('userName').textContent = name;
  document.getElementById('welcomeName').textContent = name;
  document.getElementById('postIG').value = ig;
  document.getElementById('setupModal').classList.add('hide');
  
  toast('設定完成！');
}

// 發送訊息
async function sendMsg(e) {
  e.preventDefault();
  if (!me || !meData) return;
  
  const content = document.getElementById('msgInput').value.trim();
  if (!content) return;
  
  await db.collection('messages').add({
    userId: me.uid,
    userName: meData.displayName,
    userAvatar: meData.photoURL,
    content,
    likes: 0,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  await db.collection('users').doc(me.uid).update({
    points: firebase.firestore.FieldValue.increment(1)
  });
  
  document.getElementById('msgInput').value = '';
}

// 載入聊天
function loadChat() {
  if (unsubMsg) unsubMsg();
  
  unsubMsg = db.collection('messages')
    .orderBy('time', 'asc')
    .onSnapshot(snap => {
      const box = document.getElementById('chatBox');
      box.innerHTML = '';
      
      snap.forEach(doc => {
        const m = doc.data();
        const isMe = m.userId === me?.uid;
        const time = m.time?.toDate()?.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) || '';
        
        box.innerHTML += `
          <div class="flex gap-3 p-3 rounded-xl ${isMe ? 'bg-yellow-50' : 'bg-white'}">
            <img src="${m.userAvatar || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>'}" class="w-10 h-10 rounded-full">
            <div class="flex-1">
              <div class="flex items-center gap-2">
                <span class="font-bold font-cc text-sm">${m.userName}</span>
                <span class="text-xs text-gray-400">${time}</span>
              </div>
              <p class="font-cc">${m.content}</p>
            </div>
          </div>
        `;
      });
      
      box.scrollTop = box.scrollHeight;
    });
}

// 載入排行榜
function loadRank() {
  db.collection('users')
    .orderBy('points', 'desc')
    .limit(10)
    .onSnapshot(snap => {
      const box = document.getElementById('rankBox');
      box.innerHTML = '';
      let rank = 1;
      
      snap.forEach(doc => {
        const u = doc.data();
        if (u.points <= 0) return;
        
        const icon = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '🏆';
        const title = rank === 1 ? '冠軍' : rank === 2 ? '亞軍' : rank === 3 ? '季軍' : '';
        const bg = rank === 1 ? 'from-yellow-400 to-orange-400 text-white' : 'bg-gray-100';
        
        box.innerHTML += `
          <div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-r ${bg}">
            <span class="text-2xl">${icon}</span>
            <img src="${u.photoURL || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ddd"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 00-16 0"/></svg>'}" class="w-10 h-10 rounded-full">
            <div class="flex-1 font-cc">
              <span class="font-bold">${u.displayName}</span>
              ${title ? `<br><span class="text-sm opacity-80">${title}粉絲</span>` : ''}
            </div>
            <div class="text-right font-cc">
              <span class="font-bold">${u.points}</span>分
            </div>
          </div>
        `;
        rank++;
      });
      
      if (box.innerHTML === '') {
        box.innerHTML = '<p class="text-center text-gray-500 font-cc py-8">還沒有人上榜，快去聊天吧！</p>';
      }
    });
}

// 頁面切換
function showPage(page) {
  document.getElementById('pageHome').classList.add('hide');
  document.getElementById('pageAdmin').classList.add('hide');
  document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.remove('hide');
  
  if (page === 'admin') loadAdmin();
}

// 管理員標籤
function adminTab(tab) {
  ['Msgs', 'Users', 'Posts'].forEach(t => {
    document.getElementById('admin' + t).classList.add('hide');
    document.getElementById('tab' + t).classList.remove('text-yellow-500', 'border-yellow-500', 'border-b-2');
    document.getElementById('tab' + t).classList.add('text-gray-500');
  });
  document.getElementById('admin' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hide');
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('text-gray-500');
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('text-yellow-500', 'border-b-2', 'border-yellow-500');
}

// 載入管理員資料
function loadAdmin() {
  db.collection('messages').orderBy('time', 'desc').get().then(snap => {
    const box = document.getElementById('adminMsgs');
    box.innerHTML = '';
    snap.forEach(doc => {
      const m = doc.data();
      box.innerHTML += `
        <div class="p-3 bg-gray-50 rounded-xl flex justify-between items-center">
          <div>
            <span class="font-bold font-cc">${m.userName}</span>
            <p class="font-cc">${m.content}</p>
          </div>
          <button onclick="delMsg('${doc.id}')" class="text-red-500">刪除</button>
        </div>
      `;
    });
  });
  
  db.collection('users').get().then(snap => {
    const box = document.getElementById('adminUsers');
    box.innerHTML = '';
    snap.forEach(doc => {
      const u = doc.data();
      box.innerHTML += `
        <div class="p-3 bg-gray-50 rounded-xl flex justify-between items-center">
          <div>
            <span class="font-bold font-cc">${u.displayName}</span>
            <span class="text-sm text-gray-500 ml-2">${u.points}分</span>
          </div>
          <input type="number" value="${u.points}" onchange="setPoints('${doc.id}', this.value)" class="w-20 px-2 py-1 border rounded font-cc">
        </div>
      `;
    });
  });
  
  db.collection('submissions').where('status', '==', 'pending').get().then(snap => {
    const box = document.getElementById('adminPosts');
    box.innerHTML = '';
    if (snap.empty) {
      box.innerHTML = '<p class="text-center text-gray-500 font-cc py-4">暫無待審核投稿</p>';
      return;
    }
    snap.forEach(doc => {
      const p = doc.data();
      box.innerHTML += `
        <div class="p-4 bg-gray-50 rounded-xl">
          <div class="flex justify-between mb-2">
            <span class="font-bold font-cc">${p.userName}</span>
            <span class="text-gray-500">@${p.igAccount}</span>
          </div>
          <p class="font-cc mb-3">${p.content}</p>
          <div class="flex gap-2">
            <button onclick="apprPost('${doc.id}')" class="flex-1 bg-green-500 text-white py-2 rounded font-cc">核准</button>
            <button onclick="rejectPost('${doc.id}')" class="flex-1 bg-red-500 text-white py-2 rounded font-cc">拒絕</button>
          </div>
        </div>
      `;
    });
  });
}

async function delMsg(id) {
  await db.collection('messages').doc(id).delete();
  loadAdmin();
}

async function setPoints(id, pts) {
  await db.collection('users').doc(id).update({ points: parseInt(pts) || 0 });
}

async function apprPost(id) {
  await db.collection('submissions').doc(id).update({ status: 'approved' });
  loadAdmin();
}

async function rejectPost(id) {
  await db.collection('submissions').doc(id).update({ status: 'rejected' });
  loadAdmin();
}

// 投稿
async function submitPost(e) {
  e.preventDefault();
  if (!me || !meData) return;
  
  const ig = document.getElementById('postIG').value.trim();
  const content = document.getElementById('postContent').value.trim();
  
  if (!ig) { toast('請填IG帳號'); return; }
  if (content.length < 10) { toast('內容需至少10字'); return; }
  
  await db.collection('submissions').add({
    userId: me.uid,
    userName: meData.displayName,
    igAccount: ig,
    content,
    status: 'pending',
    time: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  document.getElementById('postContent').value = '';
  toast('投稿成功！');
}

// 個人資料
function showProfile() {
  document.getElementById('editName').value = meData.displayName;
  document.getElementById('editIG').value = meData.igAccount || '';
  document.getElementById('profileModal').classList.remove('hide');
}

function closeProfile() {
  document.getElementById('profileModal').classList.add('hide');
}

async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const ig = document.getElementById('editIG').value.trim();
  
  if (!name || name.length < 2) { toast('暱稱需至少2字'); return; }
  
  await db.collection('users').doc(me.uid).update({ displayName: name, igAccount: ig });
  meData.displayName = name;
  meData.igAccount = ig;
  
  document.getElementById('userName').textContent = name;
  document.getElementById('welcomeName').textContent = name;
  document.getElementById('userTitle').textContent = meData.title;
  closeProfile();
  toast('已更新');
}
